<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>HertzQuest 氓聹聵莽路麓</title>
<script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
<style>
:root {
  --bg:#0A1628; --card:#0D2240; --border:#1E4060;
  --teal:#00C9B1; --gold:#FFB030; --red:#E05050;
  --t1:#F0F0FF; --t2:#A0C4D8; --t3:#7FBBCC;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,'Noto Sans TC',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;overscroll-behavior:none;}

/* 芒聰聙芒聰聙 Layout 芒聰聙芒聰聙 */
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.topbar{flex-shrink:0;background:var(--card);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;}
.topbar-title{font-size:17px;font-weight:900;color:var(--teal);}
.topbar-user{display:flex;align-items:center;gap:8px;}
.avatar-text{width:32px;height:32px;border-radius:50%;background:rgba(0,201,177,.2);border:1.5px solid var(--teal);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--teal);}
.username{font-size:13px;font-weight:700;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.tabbar{flex-shrink:0;background:var(--card);border-top:1px solid var(--border);display:flex;}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 0 8px;gap:3px;border:none;background:transparent;cursor:pointer;}
.tab-icon{font-size:20px;opacity:.5;}
.tab-label{font-size:10px;color:var(--t3);font-weight:700;opacity:.5;}
.tab-btn.active .tab-icon,.tab-btn.active .tab-label{opacity:1;}
.tab-btn.active .tab-label{color:var(--teal);}

/* 芒聰聙芒聰聙 Splash / Register 芒聰聙芒聰聙 */
#splash{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;z-index:999;}
.spin{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--teal);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
#register-screen{position:fixed;inset:0;background:var(--bg);z-index:100;display:flex;align-items:center;justify-content:center;padding:24px;}
.reg-card{background:var(--card);border-radius:24px;border:1px solid var(--border);padding:32px 24px;width:100%;max-width:400px;}
.reg-card .logo{text-align:center;margin-bottom:24px;}
.reg-card .logo h1{font-size:24px;font-weight:900;color:var(--teal);}
.reg-card .logo p{font-size:13px;color:var(--t3);margin-top:6px;}
.profile-strip{display:flex;align-items:center;gap:12px;background:#112840;border-radius:12px;padding:12px 14px;margin-bottom:20px;}
.profile-strip img{width:44px;height:44px;border-radius:50%;}
.profile-strip .pn{font-weight:700;font-size:15px;}
.profile-strip .ps{font-size:11px;color:var(--t3);}

/* 芒聰聙芒聰聙 Forms 芒聰聙芒聰聙 */
.field{margin-bottom:14px;}
.field label{display:block;font-size:12px;color:var(--t2);margin-bottom:6px;}
.field input,.field textarea,.field select{width:100%;background:#112840;border:1px solid var(--border);border-radius:12px;padding:12px 14px;color:var(--t1);font-size:15px;outline:none;font-family:inherit;transition:border-color .2s;}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--teal);}
.field textarea{height:80px;resize:none;}
.field select option{background:#112840;}

/* 芒聰聙芒聰聙 Buttons 芒聰聙芒聰聙 */
.btn{display:block;width:100%;padding:14px;border:none;border-radius:14px;font-size:15px;font-weight:900;cursor:pointer;transition:opacity .2s;}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn-teal{background:var(--teal);color:#0A1628;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--t3);}
.btn-red{background:transparent;border:1px solid var(--red);color:var(--red);}
.btn-sm{padding:7px 14px;font-size:12px;font-weight:700;border-radius:10px;border:1px solid;cursor:pointer;background:transparent;}

/* 芒聰聙芒聰聙 Session cards 芒聰聙芒聰聙 */
.section-pad{padding:12px;}
.section-title{font-size:13px;font-weight:700;color:var(--t3);margin-bottom:10px;}
.session-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:10px;cursor:pointer;transition:border-color .15s;}
.session-card:active{border-color:var(--teal);}
.session-card.enrolled{border-color:rgba(0,201,177,.35);}
.sc-header{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
.sc-title{font-size:15px;font-weight:800;line-height:1.3;}
.enrolled-dot{width:8px;height:8px;border-radius:50%;background:var(--teal);flex-shrink:0;margin-top:5px;}
.sc-meta{font-size:12px;color:var(--t3);margin-top:8px;display:flex;flex-direction:column;gap:4px;}
.sc-row{display:flex;align-items:center;gap:6px;}
.sc-footer{display:flex;align-items:center;justify-content:space-between;margin-top:10px;}
.spots-badge{font-size:12px;font-weight:700;}
.spots-ok{color:var(--teal);}
.spots-few{color:var(--gold);}
.spots-full{color:var(--red);}
.coach-chip{font-size:11px;color:var(--t2);background:#112840;border-radius:20px;padding:3px 10px;}
.price-chip{font-size:11px;font-weight:700;color:var(--gold);}

/* 芒聰聙芒聰聙 Cert spots row 芒聰聙芒聰聙 */
.cert-spots-row{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;}
.cert-spot-box{flex:1;min-width:80px;background:#112840;border:1px solid var(--border);border-radius:10px;padding:6px 10px;text-align:center;}
.cert-spot-box .csb-label{font-size:10px;color:var(--t3);margin-bottom:2px;}
.cert-spot-box .csb-num{font-size:13px;font-weight:700;}
.csb-ok{color:var(--teal);}
.csb-full{color:var(--red);}

/* 芒聰聙芒聰聙 Trip cards 芒聰聙芒聰聙 */
.trip-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:10px;cursor:pointer;transition:border-color .15s;}
.trip-card:active{border-color:var(--teal);}
.trip-card.enrolled{border-color:rgba(0,201,177,.35);}
.trip-country{font-size:11px;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;}
.trip-title{font-size:16px;font-weight:800;line-height:1.3;margin-bottom:8px;}
.trip-dates{font-size:12px;color:var(--t3);margin-bottom:8px;}
.trip-price-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:6px;}
.price-tag{font-size:11px;font-weight:700;background:#112840;border:1px solid var(--border);border-radius:8px;padding:4px 10px;}
.price-tag .pt-label{color:var(--t3);margin-right:4px;}
.price-tag .pt-amt{color:var(--gold);}
.trip-footer{display:flex;align-items:center;justify-content:space-between;margin-top:8px;}
.trip-no-flight{font-size:10px;color:#5A7A90;}

/* 芒聰聙芒聰聙 Select grids (cert / plan) 芒聰聙芒聰聙 */
.select-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0;}
.select-btn{padding:12px 8px;border-radius:12px;border:2px solid var(--border);background:transparent;color:var(--t1);font-size:12px;font-weight:700;cursor:pointer;text-align:center;transition:.2s;}
.select-btn:hover{border-color:var(--teal);}
.select-btn.selected{border-color:var(--teal);background:rgba(0,201,177,.1);color:var(--teal);}
.select-btn:disabled{opacity:.35;cursor:not-allowed;}
.select-btn .sb-name{font-size:13px;font-weight:900;display:block;margin-bottom:3px;}
.select-btn .sb-sub{font-size:11px;color:var(--t3);display:block;}
.select-btn.selected .sb-sub{color:var(--teal);}
.select-btn:disabled .sb-sub{color:var(--red)!important;}

/* 芒聰聙芒聰聙 Modal 芒聰聙芒聰聙 */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:flex-end;}
.modal-sheet{background:var(--bg);border-radius:24px 24px 0 0;width:100%;max-height:90vh;overflow-y:auto;padding:8px 0 32px;animation:slideUp .25s ease;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px;}
.modal-inner{padding:0 20px;}
.modal-title{font-size:20px;font-weight:900;margin-bottom:8px;}
.modal-section{margin-top:18px;}
.modal-section h4{font-size:12px;color:var(--t3);font-weight:700;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px;}
.detail-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px;font-size:14px;}
.detail-icon{font-size:18px;width:24px;text-align:center;flex-shrink:0;}
.detail-text{color:var(--t2);line-height:1.6;}
.meeting-box{background:#0D2240;border:1px solid var(--teal);border-radius:12px;padding:14px 16px;margin-top:6px;}
.meeting-box .label{font-size:11px;color:var(--teal);font-weight:700;margin-bottom:4px;}
.meeting-box .value{font-size:15px;font-weight:700;line-height:1.4;}
.desc-box{background:#112840;border-radius:12px;padding:14px;font-size:14px;color:var(--t2);line-height:1.7;white-space:pre-wrap;}
.modal-actions{margin-top:24px;display:flex;flex-direction:column;gap:10px;}

/* 芒聰聙芒聰聙 Toast / Empty 芒聰聙芒聰聙 */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#1E3A5F;border:1px solid var(--border);border-radius:12px;padding:12px 20px;font-size:14px;z-index:500;white-space:nowrap;animation:fadeInOut 2.8s ease forwards;}
.toast.success{border-color:var(--teal);color:var(--teal);}
.toast.error{border-color:var(--red);color:var(--red);}
@keyframes fadeInOut{0%{opacity:0;transform:translateX(-50%) translateY(10px)}15%{opacity:1;transform:translateX(-50%) translateY(0)}75%{opacity:1}100%{opacity:0}}
.empty{text-align:center;padding:60px 20px;color:var(--t3);font-size:14px;}
.empty .e-icon{font-size:48px;margin-bottom:12px;}
</style>
</head>
<body>

<div id="splash">
  <div class="spin"></div>
  <p>忙颅拢氓聹篓茅聙拢莽路職 LINE芒聙娄</p>
</div>

<div id="register-screen" style="display:none">
  <div class="reg-card">
    <div class="logo"><h1>HertzQuest</h1><p>忙颅隆猫驴聨茂录聛猫芦聥氓隆芦氓炉芦猫鲁聡忙聳聶氓庐聦忙聢聬氓颅赂氓聯隆莽聶禄猫篓聵</p></div>
    <div class="profile-strip">
      <img id="reg-avatar" src="" alt="">
      <div><div class="pn" id="reg-display">芒聙聰</div><div class="ps">LINE 氓赂鲁猫聶聼氓路虏茅聙拢莽碌聬</div></div>
    </div>
    <div class="field"><label>莽聹聼氓炉娄氓搂聯氓聬聧 *</label><input id="reg-name" placeholder="猫芦聥猫录赂氓聟楼莽聹聼氓炉娄氓搂聯氓聬聧"></div>
    <div class="field"><label>猫聛炉莽碌隆茅聸禄猫漏卤 *</label><input id="reg-phone" type="tel" placeholder="0912-345-678"></div>
    <button class="btn btn-teal" id="reg-btn" onclick="submitRegister()">氓庐聦忙聢聬莽聶禄猫篓聵茂录聦茅聳聥氓搂聥氓聽卤氓聬聧</button>
  </div>
</div>

<div id="app" style="display:none">
  <div class="topbar">
    <div class="topbar-title">HertzQuest</div>
    <div class="topbar-user">
      <div class="username" id="top-name">芒聙聰</div>
      <div class="avatar-text" id="top-avatar-text"></div>
    </div>
  </div>
  <div class="content" id="main-content"></div>
  <div class="tabbar">
    <button class="tab-btn active" id="tab-sessions" onclick="switchTab('sessions')">
      <span class="tab-icon">冒聼聦聤</span><span class="tab-label">氓聧鲁氓掳聡氓聹聵莽路麓</span>
    </button>
    <button class="tab-btn" id="tab-trips" onclick="switchTab('trips')">
      <span class="tab-icon">冒聼陇驴</span><span class="tab-label">忙陆聸忙掳麓忙聴聟猫隆聦</span>
    </button>
    <button class="tab-btn" id="tab-mine" onclick="switchTab('mine')">
      <span class="tab-icon">冒聼聯聥</span><span class="tab-label">忙聢聭莽職聞氓聽卤氓聬聧</span>
    </button>
    <button class="tab-btn" id="tab-profile" onclick="switchTab('profile')">
      <span class="tab-icon">冒聼聭陇</span><span class="tab-label">氓聙聥盲潞潞猫鲁聡忙聳聶</span>
    </button>
  </div>
</div>

<div class="modal-overlay" id="detail-modal" style="display:none" onclick="closeModal(event)">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-inner" id="modal-inner"></div>
  </div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzBy8q-19g_uRMbaEKRULHcd9xdp0k9Vv3RN0-5xV76cAGHEybC7Y_R0yYwpfS7G1SP1w/exec';
const LIFF_ID = '2010027559-58ppHoAr';
const MAX_UNCERT = 4; // 莽聞隆猫颅聣氓聬聧茅隆聧盲赂聤茅聶聬

let profile = null, member = null;
let sessions = [], trips = [];
let currentTab = 'sessions';
let selectedSession = null, selectedTrip = null;
let selectedCert = null, selectedPlan = null;

// 芒聰聙芒聰聙 Init 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
async function init() {
  try {
    // 10 莽搂聮猫露聟忙聶聜盲驴聺猫颅路
    await Promise.race([
      liff.init({ liffId: LIFF_ID }),
      new Promise((_, reject) => setTimeout(() => reject(new Error('LIFF 氓聢聺氓搂聥氓聦聳茅聙戮忙聶聜茂录聢10莽搂聮茂录聣\nLIFF ID: ' + LIFF_ID + '\n猫芦聥莽垄潞猫陋聧 LINE Developer Console 莽職聞 Endpoint URL 忙聵炉氓聬娄莽聜潞茂录職\nhttps://karta5216295-droid.github.io/hertzquest/')), 10000))
    ]);
    if (!liff.isLoggedIn()) { liff.login(); return; }
    profile = await liff.getProfile();
    const res = await api({ action:'initMember', lineUid:profile.userId, displayName:profile.displayName, pictureUrl:profile.pictureUrl });
    if (!res.ok) { showSplashError(res.error); return; }
    if (res.isNew && !res.justRegistered) { showRegister(); }
    else { member = res.member; showApp(); }
  } catch(e) { showSplashError(e.message || '猫录聣氓聟楼氓陇卤忙聲聴茂录聦猫芦聥茅聡聧忙聳掳茅聳聥氓聲聼'); }
}

function showSplashError(msg) {
  document.getElementById('splash').innerHTML = `<p style="color:#E05050;text-align:center;padding:20px">${msg}<br><br><small>猫芦聥氓聹篓 LINE 氓聟搂茅聳聥氓聲聼忙颅陇茅聽聛茅聺垄</small></p>`;
}

function showRegister() {
  document.getElementById('splash').style.display = 'none';
  document.getElementById('reg-avatar').src = profile.pictureUrl || '';
  document.getElementById('reg-display').textContent = profile.displayName;
  document.getElementById('register-screen').style.display = 'flex';
}

async function submitRegister() {
  const name = document.getElementById('reg-name').value.trim();
  const phone = document.getElementById('reg-phone').value.trim();
  if (!name || !phone) { toast('猫芦聥氓隆芦氓炉芦氓搂聯氓聬聧氓聮聦茅聸禄猫漏卤', 'error'); return; }
  const btn = document.getElementById('reg-btn');
  btn.disabled = true; btn.textContent = '莽聶禄猫篓聵盲赂颅芒聙娄';
  const res = await api({ action:'initMember', lineUid:profile.userId, displayName:profile.displayName, pictureUrl:profile.pictureUrl, realName:name, phone });
  if (res.ok) { member = res.member; showApp(); }
  else { toast(res.error || '莽聶禄猫篓聵氓陇卤忙聲聴', 'error'); btn.disabled = false; btn.textContent = '氓庐聦忙聢聬莽聶禄猫篓聵茂录聦茅聳聥氓搂聥氓聽卤氓聬聧'; }
}

function showApp() {
  document.getElementById('splash').style.display = 'none';
  document.getElementById('register-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  const n = member?.realName || profile?.displayName || '氓颅赂氓聯隆';
  document.getElementById('top-name').textContent = n;
  document.getElementById('top-avatar-text').textContent = n[0] || '?';
  switchTab('sessions');
}

// 芒聰聙芒聰聙 Tabs 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
function switchTab(tab) {
  currentTab = tab;
  ['sessions','trips','mine','profile'].forEach(t => {
    document.getElementById('tab-'+t)?.classList.toggle('active', t===tab);
  });
  renderTab(tab);
}

arync function renderTab(tab) {
  const el = document.getElementById('main-content');

  if (tab === 'sessions') {
    el.innerHTML = '<div class="section-pad"><div class="section-title">氓聧鲁氓掳聡猫聢聣猫隆聦莽職聞忙麓禄氓聥聲</div><div id="session-list"><div class="empty"><div class="spin" style="margin:0 auto"></div></div></div></div>';
    const res = await api({ action:'getSessions', lineUid:profile.userId });
    if (!res.ok) { document.getElementById('session-list').innerHTML = '<div class="empty">猫录聣氓聟楼氓陇卤忙聲聴</div>'; return; }
    sessions = res.sessions || [];
    renderSessionList();

  } else if (tab === 'trips') {
    el.innerHTML = '<div class="section-pad"><div class="section-title">忙陆聸忙掳麓忙聴聟猫隆聦猫隆聦莽篓聥</div><div id="trip-list"><div class="empty"><div class="spin" style="margin:0 auto"></div></div></div></div>';
    const res = await api({ action:'getTrips', lineUid:profile.userId });
    if (!res.ok) { document.getElementById('trip-list').innerHTML = '<div class="empty">猫录聣氓聟楼氓陇卤忙聲聴</div>'; return; }
    trips = res.trips || [];
    renderTripList();

  } else if (tab === 'mine') {
    el.innerHTML = '<div class="section-pad"><div class="section-title">忙聢聭莽職聞氓聽卤氓聬聧莽麓聙茅聦聞</div><div id="mine-list"><div class="empty"><div class="spin" style="margin:0 auto"></div></div></div></div>';
    const [sr, tr] = await Promise.all([
      api({ action:'myEnrollments', lineUid:profile.userId }),
      api({ action:'myTripEnrollments', lineUid:profile.userId })
    ]);
    const listEl = document.getElementById('mine-list');
    let html = '';
    if (sr.ok && sr.enrollments && sr.enrollments.length) {
      html += '<div style="font-size:12px;font-weight:700;color:var(--t3);margin:4px 0 8px">冒聼聦聤 氓聹聵莽路麓</div>';
      html += sr.enrollments.map(s => mineSessionCardHTML(s)).join('');
    }
    if (tr.ok && tr.enrollments && tr.enrollments.length) {

function closeModal(e) {

async function submitEnroll(sessionId) {

  const confirmBtn = document.getElementById('confirm-enroll-btn');
  if (confirmBtn) { confirmBtn.disabled = true; confirmBtn.textContent = '氓聽卤氓聬聧盲赂颅芒聙娄'; }
  const res = await api({ action:'enrollSession', lineUid:profile.userId, sessionId, certLevel:selectedCert, transferCode });
  if (res.ok) {
    const s = sessions.find(s=>s.id===sessionId);

      if (selectedCert === '莽聞隆猫颅聣') s.uncertCount = (Number(s.uncertCount)||0)+1;

      <div class="modal-title" style="color:var(--teal)">芒聹聟 氓聽卤氓聬聧忙聢聬氓聤聼茂录聛</div>
      <div class="modal-section">
        <div style="background:rgba(0,201,177,.1);border:1px solid rgba(0,201,177,.3);border-radius:12px;padding:14px 16px;font-size:14px;line-height:1.9;color:var(--t2)">

}

async function enrollTrip(tripId) {

  const res = await api({ action:'enrollTrip', lineUid:profile.userId, tripId, plan:selectedPlan });
  if (res.ok) {

async function api(data) {
  try {
    const r = await fetch(GAS_URL, { method:'POST', body:JSON.stringify(data) });
    return r.json();
  } catch(e) { return {ok:false,error:'莽露虏猫路炉茅聦炉猫陋陇'}; }
}

function toast(msg, type='success') {
  const el = document.createElement('div');
  el.className = 'toast '+type; el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
