<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>HertzQuest 團練</title>
<script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
<style>
:root {
  --bg:#060E1A; --bg2:#091524; --card:#0C1E30; --card2:#102840;
  --border:#1A3852; --border2:#20486E;
  --teal:#00C9B1; --gold:#C9A84C; --red:#C04545;
  --t1:#EEF4FF; --t2:#7FAFC5; --t3:#4A7A98;
  --glow:0 0 24px rgba(0,201,177,.1);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,'Noto Sans TC',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;overscroll-behavior:none;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 120% 60% at 50% -10%,rgba(0,201,177,.06) 0%,transparent 60%),radial-gradient(ellipse 80% 40% at 80% 110%,rgba(0,80,160,.07) 0%,transparent 50%);pointer-events:none;z-index:0;}

/* ── Layout ── */
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden;position:relative;z-index:1;}

/* ── Topbar ── */
.topbar{flex-shrink:0;background:rgba(6,14,26,.94);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:13px 18px;display:flex;align-items:center;justify-content:space-between;}
.topbar-logo{display:flex;align-items:center;gap:9px;}
.topbar-mark{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,rgba(0,201,177,.18),rgba(0,80,180,.14));border:1px solid rgba(0,201,177,.3);display:flex;align-items:center;justify-content:center;}
.topbar-mark svg{width:16px;height:16px;}
.topbar-title{font-size:16px;font-weight:900;color:var(--teal);letter-spacing:.3px;}
.topbar-user{display:flex;align-items:center;gap:9px;}
.username{font-size:12px;font-weight:600;color:var(--t2);max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.avatar-text{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,rgba(0,201,177,.18),rgba(0,80,160,.18));border:1.5px solid rgba(0,201,177,.45);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:var(--teal);}

/* ── Content ── */
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;position:relative;z-index:1;}

/* ── Tabbar ── */
.tabbar{flex-shrink:0;background:rgba(6,14,26,.96);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid var(--border);display:flex;padding-bottom:env(safe-area-inset-bottom,0);}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 0 8px;gap:4px;border:none;background:transparent;cursor:pointer;position:relative;}
.tab-btn::after{content:'';position:absolute;top:0;left:25%;right:25%;height:1.5px;background:var(--teal);border-radius:0 0 2px 2px;transform:scaleX(0);transition:transform .2s ease;}
.tab-btn.active::after{transform:scaleX(1);}
.tab-icon{width:22px;height:22px;color:var(--t3);opacity:.45;transition:opacity .2s,color .2s;}
.tab-icon svg{width:100%;height:100%;}
.tab-label{font-size:9px;color:var(--t3);font-weight:700;letter-spacing:.3px;opacity:.45;transition:all .2s;}
.tab-btn.active .tab-icon{opacity:1;color:var(--teal);}
.tab-btn.active .tab-label{opacity:1;color:var(--teal);}

/* ── Splash ── */
#splash{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:18px;z-index:999;}
#splash .s-logo-wrap{width:60px;height:60px;border-radius:18px;background:linear-gradient(135deg,rgba(0,201,177,.16),rgba(0,80,160,.14));border:1px solid rgba(0,201,177,.28);display:flex;align-items:center;justify-content:center;}
#splash .s-logo-wrap svg{width:30px;height:30px;}
#splash .s-brand{font-size:22px;font-weight:900;color:var(--teal);letter-spacing:.5px;}
#splash .s-tag{font-size:12px;color:var(--t3);}
.spin{width:28px;height:28px;border:2px solid var(--border2);border-top-color:var(--teal);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Register ── */
#register-screen{position:fixed;inset:0;background:var(--bg);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;}
.reg-card{background:var(--card);border-radius:26px;border:1px solid var(--border);padding:32px 24px;width:100%;max-width:400px;}
.reg-logo{text-align:center;margin-bottom:28px;}
.reg-logo .rl-mark{width:54px;height:54px;border-radius:16px;background:linear-gradient(135deg,rgba(0,201,177,.14),rgba(0,80,160,.14));border:1px solid rgba(0,201,177,.28);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;}
.reg-logo .rl-mark svg{width:26px;height:26px;}
.reg-logo h1{font-size:21px;font-weight:900;color:var(--t1);}
.reg-logo h1 span{color:var(--teal);}
.reg-logo p{font-size:12px;color:var(--t3);margin-top:7px;line-height:1.7;}
.profile-strip{display:flex;align-items:center;gap:12px;background:var(--card2);border-radius:14px;border:1px solid var(--border);padding:12px 14px;margin-bottom:22px;}
.profile-strip img{width:42px;height:42px;border-radius:50%;border:1.5px solid var(--border2);}
.profile-strip .pn{font-weight:700;font-size:14px;}
.profile-strip .ps{font-size:11px;color:var(--t3);margin-top:2px;}

/* ── Fields ── */
.field{margin-bottom:14px;}
.field label{display:block;font-size:10px;font-weight:800;color:var(--t3);margin-bottom:7px;letter-spacing:.6px;text-transform:uppercase;}
.field input,.field textarea,.field select{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:13px 15px;color:var(--t1);font-size:15px;outline:none;font-family:inherit;transition:border-color .2s,box-shadow .2s;}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(0,201,177,.09);}
.field textarea{height:80px;resize:none;}
.field select option{background:#112840;}

/* ── Buttons ── */
.btn{display:block;width:100%;padding:15px;border:none;border-radius:14px;font-size:14px;font-weight:800;cursor:pointer;transition:opacity .2s,transform .1s;letter-spacing:.2px;}
.btn:active:not(:disabled){transform:scale(.98);}
.btn:disabled{opacity:.3;cursor:not-allowed;}
.btn-teal{background:linear-gradient(135deg,var(--teal),#00B09E);color:#041018;}
.btn-outline{background:transparent;border:1px solid var(--border2);color:var(--t2);}
.btn-red{background:transparent;border:1px solid rgba(192,69,69,.5);color:var(--red);}
.btn-sm{padding:7px 14px;font-size:11px;font-weight:700;border-radius:10px;border:1px solid;cursor:pointer;background:transparent;letter-spacing:.2px;}

/* ── Section ── */
.section-pad{padding:16px 14px;}
.section-header{display:flex;align-items:center;gap:8px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border);}
.sh-line{width:3px;height:14px;background:var(--teal);border-radius:2px;flex-shrink:0;}
.section-title{font-size:10px;font-weight:800;color:var(--t3);letter-spacing:.8px;text-transform:uppercase;}

/* ── Cards ── */
.session-card,.trip-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:18px;margin-bottom:10px;cursor:pointer;transition:border-color .15s,box-shadow .15s;position:relative;overflow:hidden;}
.session-card::before,.trip-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,201,177,.15),transparent);}
.session-card:active,.trip-card:active{border-color:var(--teal);box-shadow:var(--glow);}
.session-card.enrolled,.trip-card.enrolled{border-color:rgba(0,201,177,.28);background:rgba(0,201,177,.025);}

.sc-header{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
.sc-title,.trip-title{font-size:16px;font-weight:800;line-height:1.35;color:var(--t1);}
.enrolled-indicator{display:flex;align-items:center;gap:4px;background:rgba(0,201,177,.1);border:1px solid rgba(0,201,177,.22);border-radius:20px;padding:3px 8px;flex-shrink:0;margin-top:2px;}
.enrolled-indicator .ei-dot{width:5px;height:5px;border-radius:50%;background:var(--teal);}
.enrolled-indicator span{font-size:9px;font-weight:700;color:var(--teal);letter-spacing:.3px;}

.sc-meta{margin-top:10px;display:flex;flex-direction:column;gap:5px;}
.sc-row{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--t2);}
.sc-row svg{width:12px;height:12px;flex-shrink:0;opacity:.65;}

.cert-spots-row{display:flex;gap:6px;margin-top:12px;}
.cert-spot-box{flex:1;background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:8px 10px;text-align:center;}
.csb-label{font-size:9px;color:var(--t3);font-weight:700;letter-spacing:.3px;text-transform:uppercase;margin-bottom:4px;}
.csb-num{font-size:14px;font-weight:800;}
.csb-ok{color:var(--teal);}
.csb-full{color:var(--red);}

.sc-footer,.trip-footer{display:flex;align-items:center;justify-content:space-between;margin-top:12px;}
.spots-badge{font-size:11px;font-weight:700;}
.spots-ok{color:var(--teal);}.spots-few{color:var(--gold);}.spots-full{color:var(--red);}
.coach-chip{font-size:10px;color:var(--t3);background:var(--card2);border-radius:20px;padding:3px 10px;}
.price-chip{font-size:12px;font-weight:800;color:var(--gold);}

.trip-country{font-size:10px;color:var(--t3);font-weight:800;text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;display:flex;align-items:center;gap:5px;}
.trip-country svg{width:11px;height:11px;}
.trip-dates{font-size:12px;color:var(--t2);margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.trip-dates svg{width:12px;height:12px;opacity:.65;}
.trip-price-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;}
.price-tag{font-size:11px;font-weight:700;background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:5px 10px;}
.price-tag .pt-label{color:var(--t3);margin-right:4px;}
.price-tag .pt-amt{color:var(--gold);}
.trip-no-flight{font-size:10px;color:var(--t3);display:flex;align-items:center;gap:4px;}
.trip-no-flight svg{width:11px;height:11px;}

/* ── Select grid ── */
.select-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0;}
.select-btn{padding:14px 10px;border-radius:14px;border:1px solid var(--border);background:var(--card2);color:var(--t1);font-size:13px;font-weight:700;cursor:pointer;text-align:center;transition:.2s;}
.select-btn.selected{border-color:var(--teal);background:rgba(0,201,177,.07);box-shadow:0 0 0 1px rgba(0,201,177,.18);}
.select-btn:disabled{opacity:.28;cursor:not-allowed;}
.select-btn .sb-name{font-size:14px;font-weight:900;display:block;margin-bottom:4px;}
.select-btn .sb-sub{font-size:10px;color:var(--t3);display:block;}
.select-btn.selected .sb-name{color:var(--teal);}
.select-btn.selected .sb-sub{color:rgba(0,201,177,.65);}
.select-btn:disabled .sb-sub{color:var(--red)!important;}

/* ── Modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);z-index:200;display:flex;align-items:flex-end;}
.modal-sheet{background:var(--bg2);border-radius:24px 24px 0 0;border:1px solid var(--border);border-bottom:none;width:100%;max-height:92vh;overflow-y:auto;padding:8px 0 40px;animation:slideUp .22s ease;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:36px;height:3px;background:var(--border2);border-radius:2px;margin:0 auto 18px;}
.modal-inner{padding:0 20px;}
.modal-title{font-size:21px;font-weight:900;margin-bottom:10px;line-height:1.3;}
.modal-section{margin-top:20px;}
.modal-section h4{font-size:10px;color:var(--t3);font-weight:800;margin-bottom:12px;text-transform:uppercase;letter-spacing:.8px;display:flex;align-items:center;gap:8px;}
.modal-section h4::after{content:'';flex:1;height:1px;background:var(--border);}
.detail-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px;}
.detail-icon{width:18px;flex-shrink:0;margin-top:2px;color:var(--t3);}
.detail-icon svg{width:14px;height:14px;}
.detail-text{font-size:14px;color:var(--t2);line-height:1.7;}
.meeting-box{background:var(--card);border:1px solid rgba(0,201,177,.22);border-radius:14px;padding:14px 16px;margin-top:6px;}
.meeting-box .label{font-size:10px;color:var(--teal);font-weight:800;letter-spacing:.5px;margin-bottom:6px;text-transform:uppercase;}
.meeting-box .value{font-size:15px;font-weight:700;line-height:1.5;}
.desc-box{background:var(--card2);border-radius:12px;padding:14px;font-size:14px;color:var(--t2);line-height:1.8;white-space:pre-wrap;}
.modal-actions{margin-top:24px;display:flex;flex-direction:column;gap:10px;}

/* ── Bank box ── */
.bank-box{background:var(--card);border:1px solid rgba(0,201,177,.18);border-radius:14px;padding:16px;margin-bottom:14px;}
.bank-box .bb-label{font-size:10px;color:var(--teal);font-weight:800;letter-spacing:.5px;text-transform:uppercase;margin-bottom:12px;}
.bank-box .bb-bank{font-size:13px;color:var(--t2);margin-bottom:4px;}
.bank-box .bb-num{font-size:18px;font-weight:800;color:var(--t1);letter-spacing:1px;}

/* ── Enrolled banner ── */
.enrolled-banner{background:rgba(0,201,177,.06);border:1px solid rgba(0,201,177,.18);border-radius:12px;padding:12px 16px;font-size:13px;color:var(--teal);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.enrolled-banner svg{width:15px;height:15px;flex-shrink:0;}

/* ── Success box ── */
.success-box{background:rgba(0,201,177,.05);border:1px solid rgba(0,201,177,.18);border-radius:16px;padding:22px 18px;}
.success-box .sb-check{width:44px;height:44px;border-radius:50%;background:rgba(0,201,177,.12);border:1.5px solid rgba(0,201,177,.35);display:flex;align-items:center;justify-content:center;margin-bottom:14px;}
.success-box .sb-check svg{width:20px;height:20px;color:var(--teal);}
.success-box .sb-title{font-size:15px;font-weight:800;margin-bottom:4px;}
.success-box .sb-sub{font-size:13px;color:var(--t2);margin-bottom:14px;}
.success-box .sb-divider{border-top:1px solid rgba(0,201,177,.15);padding-top:12px;font-size:12px;color:var(--t3);line-height:1.9;}

/* ── Toast / Empty ── */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--border);border-radius:12px;padding:11px 18px;font-size:13px;font-weight:600;z-index:500;white-space:nowrap;animation:fadeInOut 2.8s ease forwards;}
.toast.success{border-color:rgba(0,201,177,.38);color:var(--teal);}
.toast.error{border-color:rgba(192,69,69,.38);color:var(--red);}
@keyframes fadeInOut{0%{opacity:0;transform:translateX(-50%) translateY(8px)}15%{opacity:1;transform:translateX(-50%) translateY(0)}75%{opacity:1}100%{opacity:0}}
.empty{text-align:center;padding:56px 20px;color:var(--t3);font-size:14px;display:flex;flex-direction:column;align-items:center;gap:12px;}
.empty svg{width:36px;height:36px;opacity:.25;}
.empty p{line-height:1.75;}

/* ── Profile ── */
.profile-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px 20px;text-align:center;margin-top:8px;}
.profile-avatar-big{width:70px;height:70px;border-radius:50%;background:linear-gradient(135deg,rgba(0,201,177,.18),rgba(0,80,160,.18));border:2px solid rgba(0,201,177,.32);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:24px;font-weight:900;color:var(--teal);}
.profile-name{font-size:19px;font-weight:900;margin-bottom:4px;}
.profile-sub{font-size:13px;color:var(--t3);}
.profile-info{margin-top:20px;background:var(--card2);border-radius:14px;border:1px solid var(--border);overflow:hidden;text-align:left;}
.pi-row{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--border);font-size:14px;}
.pi-row:last-child{border-bottom:none;}
.pi-icon{color:var(--t3);flex-shrink:0;}
.pi-icon svg{width:15px;height:15px;}
.pi-label{font-size:10px;color:var(--t3);margin-bottom:2px;font-weight:700;letter-spacing:.3px;}
.pi-value{color:var(--t1);}
</style>
</head>
<body>

<div id="splash">
  <div class="s-logo-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke="var(--teal)" stroke-width="2" stroke-linecap="round">
      <path d="M2 11 Q5 7 8 11 Q11 15 14 11 Q17 7 20 11 Q21 13 22 11"/>
      <path d="M2 16 Q5 12 8 16 Q11 20 14 16 Q17 12 20 16 Q21 18 22 16" opacity=".45"/>
    </svg>
  </div>
  <div class="s-brand">HertzQuest</div>
  <div class="s-tag">自由潛水 · 團練報名</div>
  <div class="spin"></div>
</div>

<div id="register-screen" style="display:none">
  <div class="reg-card">
    <div class="reg-logo">
      <div class="rl-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="var(--teal)" stroke-width="2" stroke-linecap="round">
          <path d="M2 11 Q5 7 8 11 Q11 15 14 11 Q17 7 20 11 Q21 13 22 11"/>
          <path d="M2 16 Q5 12 8 16 Q11 20 14 16 Q17 12 20 16" opacity=".5"/>
        </svg>
      </div>
      <h1><span>Hertz</span>Quest</h1>
      <p>歡迎！請填寫資料完成學員登記</p>
    </div>
    <div class="profile-strip">
      <img id="reg-avatar" src="" alt="">
      <div><div class="pn" id="reg-display">—</div><div class="ps">LINE 帳號已連結</div></div>
    </div>
    <div class="field"><label>真實姓名</label><input id="reg-name" placeholder="請輸入真實姓名"></div>
    <div class="field"><label>聯絡電話</label><input id="reg-phone" type="tel" placeholder="0912-345-678"></div>
    <button class="btn btn-teal" id="reg-btn" onclick="submitRegister()">完成登記</button>
  </div>
</div>

<div id="app" style="display:none">
  <div class="topbar">
    <div class="topbar-logo">
      <div class="topbar-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="var(--teal)" stroke-width="2.2" stroke-linecap="round">
          <path d="M2 11 Q5 7 8 11 Q11 15 14 11 Q17 7 20 11 Q21 13 22 11"/>
          <path d="M2 16 Q5 12 8 16 Q11 20 14 16 Q17 12 20 16" opacity=".45"/>
        </svg>
      </div>
      <div class="topbar-title">HertzQuest</div>
    </div>
    <div class="topbar-user">
      <div class="username" id="top-name">—</div>
      <div class="avatar-text" id="top-avatar-text"></div>
    </div>
  </div>

  <div class="content" id="main-content"></div>

  <div class="tabbar">
    <button class="tab-btn active" id="tab-sessions" onclick="switchTab('sessions')">
      <div class="tab-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M2 11 Q5 7 8 11 Q11 15 14 11 Q17 7 20 11 Q21 13 22 11"/>
          <path d="M2 16 Q5 12 8 16 Q11 20 14 16 Q17 12 20 16" opacity=".5"/>
        </svg>
      </div>
      <span class="tab-label">即將團練</span>
    </button>
    <button class="tab-btn" id="tab-trips" onclick="switchTab('trips')">
      <div class="tab-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="9"/>
          <path d="M2 12h20 M12 3 Q16 8 16 12 Q16 16 12 21 M12 3 Q8 8 8 12 Q8 16 12 21"/>
        </svg>
      </div>
      <span class="tab-label">潛水旅行</span>
    </button>
    <button class="tab-btn" id="tab-mine" onclick="switchTab('mine')">
      <div class="tab-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="5" y="2" width="14" height="20" rx="2"/>
          <path d="M9 7h6M9 12h6M9 17h4"/>
        </svg>
      </div>
      <span class="tab-label">我的報名</span>
    </button>
    <button class="tab-btn" id="tab-profile" onclick="switchTab('profile')">
      <div class="tab-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="8" r="4"/>
          <path d="M4 20C4 17 7.6 14 12 14C16.4 14 20 17 20 20"/>
        </svg>
      </div>
      <span class="tab-label">個人資料</span>
    </button>
  </div>
</div>

<div class="modal-overlay" id="detail-modal" style="display:none" onclick="closeModal(event)">

const GAS_URL = 'https://script.google.com/macros/s/AKfycbzBy8q-19g_uRMbaEKRULHcd9xdp0k9Vv3RN0-5xV76cAGHEybC7Y_R0yYwpfS7G1SP1w/exec';
const LIFF_ID = '2010027559-58ppHoAr';
const MAX_UNCERT = 4;

let profile = null, member = null;
let sessions = [], trips = [];
let currentTab = 'sessions';
let selectedCert = null, selectedPlan = null;

// ── Init ──────────────────────────────────────────
async function init() {
  try {
    await Promise.race([
      liff.init({ liffId: LIFF_ID }),
      new Promise((_,reject) => setTimeout(() => reject(new Error('LIFF 初始化逾時\nLIFF ID: '+LIFF_ID)), 10000))
    ]);
    if (!liff.isLoggedIn()) { liff.login(); return; }
    profile = await liff.getProfile();
    const res = await api({ action:'initMember', lineUid:profile.userId, displayName:profile.displayName, pictureUrl:profile.pictureUrl });
    if (!res.ok) { showSplashError(res.error); return; }
    if (res.isNew && !res.justRegistered) { showRegister(); }
    else { member = res.member; showApp(); }
  } catch(e) { showSplashError(e.message || '載入失敗，請重新開啟'); }
}

function showSplashError(msg) {
  document.getElementById('splash').innerHTML = `<p style="color:var(--red);text-align:center;padding:24px;font-size:13px;line-height:1.9">${msg}<br><br><small style="color:var(--t3)">請在 LINE 內開啟此頁面</small></p>`;
}

function showRegister() {
  document.getElementById('splash').style.display = 'none';
  document.getElementById('reg-avatar').src = profile.pictureUrl || '';
  document.getElementById('reg-display').textContent = profile.displayName;
  document.getElementById('register-screen').style.display = 'flex';
}

async function submitRegister() {
  const name = document.getElementById('reg-name').value.trim();
  const phone = document.getElementById('reg-phone').value.trim();
  if (!name || !phone) { toast('請填寫姓名和電話', 'error'); return; }
  const btn = document.getElementById('reg-btn');
  btn.disabled = true; btn.textContent = '登記中…';
  const res = await api({ action:'initMember', lineUid:profile.userId, displayName:profile.displayName, pictureUrl:profile.pictureUrl, realName:name, phone });
  if (res.ok) { member = res.member; showApp(); }
  else { toast(res.error || '登記失敗', 'error'); btn.disabled = false; btn.textContent = '完成登記'; }
}

function showApp() {
  document.getElementById('splash').style.display = 'none';
  document.getElementById('register-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  const n = member?.realName || profile?.displayName || '學員';
  document.getElementById('top-name').textContent = n;
  document.getElementById('top-avatar-text').textContent = n[0] || '?';
  switchTab('sessions');
}

// ── Tabs ──────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  ['sessions','trips','mine','profile'].forEach(t => {
    document.getElementById('tab-'+t)?.classList.toggle('active', t===tab);
  });
  renderTab(tab);
}

async function renderTab(tab) {
  const el = document.getElementById('main-content');

  if (tab === 'sessions') {
    el.innerHTML = `<div class="section-pad">${greetingBannerHTML()}<div class="section-header"><div class="sh-line"></div><div class="section-title">即將舉行的活動</div></div><div id="session-list"><div class="empty">${IC.wave}<p>載入中…</p></div></div></div>`;
    const res = await api({ action:'getSessions', lineUid:profile.userId });
    if (!res.ok) { document.getElementById('session-list').innerHTML = '<div class="empty"><p>載入失敗</p></div>'; return; }
    sessions = res.sessions || [];
    renderSessionList();
    updateGreetingCountdown();

  } else if (tab === 'trips') {
    el.innerHTML = `<div class="section-pad"><div class="section-header"><div class="sh-line"></div><div class="section-title">潛水旅行行程</div></div><div id="trip-list"><div class="empty">${IC.wave}<p>載入中…</p></div></div></div>`;
    const res = await api({ action:'getTrips', lineUid:profile.userId });
    if (!res.ok) { document.getElementById('trip-list').innerHTML = '<div class="empty"><p>載入失敗</p></div>'; return; }
    trips = res.trips || [];
    renderTripList();

  } else if (tab === 'mine') {
    el.innerHTML = `<div class="section-pad"><div class="section-header"><div class="sh-line"></div><div class="section-title">我的報名紀錄</div></div><div id="mine-list"><div class="empty">${IC.wave}<p>載入中…</p></div></div></div>`;
    const [sr, tr] = await Promise.all([
      api({ action:'myEnrollments', lineUid:profile.userId }),
      api({ action:'myTripEnrollments', lineUid:profile.userId })
    ]);
    const listEl = document.getElementById('mine-list');
    let html = '';
    if (sr.ok && sr.enrollments?.length) {
      html += `<div style="font-size:10px;font-weight:800;color:var(--t3);letter-spacing:.7px;text-transform:uppercase;margin:4px 0 10px;display:flex;align-items:center;gap:6px"><div style="width:2px;height:10px;background:var(--teal);border-radius:1px"></div>團練</div>`;
      html += sr.enrollments.map(s => mineSessionCardHTML(s)).join('');
    }
    if (tr.ok && tr.enrollments?.length) {
      html += `<div style="font-size:10px;font-weight:800;color:var(--t3);letter-spacing:.7px;text-transform:uppercase;margin:18px 0 10px;display:flex;align-items:center;gap:6px"><div style="width:2px;height:10px;background:var(--teal);border-radius:1px"></div>旅行</div>`;
      html += tr.enrollments.map(t => myTripCardHTML(t)).join('');
    }
    listEl.innerHTML = html || `<div class="empty">${IC.wave}<p>還沒有報名紀錄<br>快去報名你的第一場活動！</p><button onclick="switchTab('sessions')" style="margin-top:4px;background:transparent;border:none;color:var(--teal);font-size:14px;font-weight:800;cursor:pointer;letter-spacing:.2px">去看活動 →</button></div>`;

  } else {
    el.innerHTML = `
      <div class="section-pad">
        <div class="profile-card">
          <div class="profile-avatar-big">${(member?.realName||'?')[0]}</div>
          <div class="profile-name">${member?.realName||'—'}</div>
          <div class="profile-sub">${profile?.displayName||''}</div>
          <div class="profile-info">
            <div class="pi-row"><div class="pi-icon">${IC.person}</div><div><div class="pi-label">LINE 名稱</div><div class="pi-value">${profile?.displayName||'—'}</div></div></div>
            <div class="pi-row"><div class="pi-icon">${IC.phone}</div><div><div class="pi-label">聯絡電話</div><div class="pi-value">${member?.phone||'—'}</div></div></div>
          </div>
        </div>
        <div style="margin-top:14px;background:var(--card2);border:1px solid var(--border);border-radius:16px;padding:18px 18px 16px;">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
            <div style="width:22px;height:22px;color:var(--teal);opacity:.75">${IC.wave}</div>
            <div style="font-size:11px;font-weight:800;color:var(--t3);letter-spacing:.7px;text-transform:uppercase">關於 HertzQuest</div>
          </div>
          <div class="desc-box" style="background:transparent;padding:0;font-size:13px;line-height:1.85;color:var(--t3)">HertzQuest 是一個專為自由潛水愛好者設計的團練報名系統，由教練團隊運營。如有任何問題，請聯絡教練。</div>
        </div>
      </div>`;
  }
}

// ── Greeting Banner ───────────────────────────────
function greetingBannerHTML() {
  const h = new Date().getHours();
  const greeting = h < 12 ? '早安' : h < 18 ? '午安' : '晚安';
  const name = member?.realName || profile?.displayName || '學員';
  return `
    <div style="background:linear-gradient(135deg,rgba(0,201,177,.07),rgba(0,80,160,.06));border:1px solid rgba(0,201,177,.13);border-radius:16px;padding:15px 18px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:10px;">
      <div>
        <div style="font-size:15px;font-weight:800;color:var(--t1)">${greeting}，${esc(name)}</div>
        <div style="font-size:12px;color:var(--t2);margin-top:4px" id="greeting-countdown">正在載入活動…</div>
      </div>
      <div style="opacity:.3;flex-shrink:0;width:28px;height:28px;color:var(--teal)">${IC.wave}</div>
    </div>`;
}

function updateGreetingCountdown() {
  const el = document.getElementById('greeting-countdown');
  if (!el) return;
  if (!sessions.length) { el.textContent = '目前沒有即將到來的活動'; return; }
  const now = new Date(); now.setHours(0,0,0,0);
  const upcoming = sessions
    .map(s => ({ s, d: new Date(s.date) }))
    .filter(x => !isNaN(x.d))
    .sort((a, b) => a.d - b.d)
    .find(x => x.d >= now);
  if (!upcoming) { el.textContent = '敬請期待下次活動'; return; }
  const diff = Math.round((upcoming.d - now) / (1000*60*60*24));
  if (diff === 0) el.textContent = '今天有活動！快去查看報名詳情';
  else if (diff === 1) el.textContent = '距最近一場活動 明天';
  else el.textContent = `距最近一場活動還有 ${diff} 天`;
}

// ── Session List ──────────────────────────────────
function renderSessionList() {
  const el = document.getElementById('session-list');
  if (!sessions.length) {
    el.innerHTML = `<div class="empty">${IC.wave}<p>目前沒有即將到來的活動<br>請持續關注！</p></div>`;
    return;
  }
  el.innerHTML = sessions.map(s => sessionCardHTML(s)).join('');
}

function sessionCardHTML(s) {
  const spots = Number(s.spotsLeft);
  const spotsClass = spots<=0?'spots-full':spots<=3?'spots-few':'spots-ok';
  const spotsLabel = spots<=0?'名額已滿':`剩 ${spots} 位`;
  const uncertLeft = Math.max(0, MAX_UNCERT - Number(s.uncertCount||0));
  return `
    <div class="session-card ${s.enrolled?'enrolled':''}" onclick="openDetail('${s.id}')">
      <div class="sc-header">
        <div class="sc-title">${esc(s.title)}</div>
        ${s.enrolled?`<div class="enrolled-indicator"><div class="ei-dot"></div><span>已報名</span></div>`:''}
      </div>
      <div class="sc-meta">
        <div class="sc-row">${IC.cal} ${s.date}${s.time?' · '+s.time:''}</div>
        <div class="sc-row">${IC.pin} ${esc(s.location||'')}</div>
        ${s.meetingPoint?`<div class="sc-row">${IC.map} 集合：<strong style="color:var(--t1)">${esc(s.meetingPoint)}</strong></div>`:''}
      </div>
      <div class="cert-spots-row">
        <div class="cert-spot-box">
          <div class="csb-label">無證名額</div>
          <div class="csb-num ${uncertLeft>0?'csb-ok':'csb-full'}">${uncertLeft}/${MAX_UNCERT}</div>
        </div>
        <div class="cert-spot-box">
          <div class="csb-label">有證名額</div>
          <div class="csb-num ${spots>0?'csb-ok':'csb-full'}">${spots>0?'開放':'已滿'}</div>
        </div>
      </div>
      <div class="sc-footer">
        <span class="spots-badge ${spotsClass}">${spotsLabel}</span>
        <div style="display:flex;gap:8px;align-items:center">
          ${s.price?`<span class="price-chip">NT$ ${s.price}</span>`:'<span class="price-chip" style="color:var(--teal)">免費</span>'}
          ${s.coach?`<span class="coach-chip">${esc(s.coach)}</span>`:''}
        </div>
      </div>
    </div>`;
}

function mineSessionCardHTML(s) {
  const certLabel = s.certLevel ? certName(s.certLevel) : '';
  return `
    <div class="session-card enrolled">
      <div class="sc-header"><div class="sc-title">${esc(s.title)}</div><div class="enrolled-indicator"><div class="ei-dot"></div><span>已報名</span></div></div>
      <div class="sc-meta">
        <div class="sc-row">${IC.cal} ${s.date}${s.time?' · '+s.time:''}</div>
        <div class="sc-row">${IC.pin} ${esc(s.location||'')}</div>
        ${certLabel?`<div class="sc-row">${IC.card} ${certLabel}</div>`:''}
      </div>
      <div style="margin-top:10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        ${paymentStatusBadge(s.paymentStatus)}
        ${s.transferCode?`<span style="font-size:10px;color:var(--t3);font-weight:600">匯款末5碼：<span style="color:var(--t2);font-weight:800">${esc(s.transferCode)}</span></span>`:''}
      </div>
      <div style="margin-top:12px">
        <button class="btn-sm" style="border-color:rgba(192,69,69,.5);color:var(--red)" onclick="cancelEnroll('${s.id}')">取消報名</button>
      </div>
    </div>`;
}

// ── Session Detail ────────────────────────────────
function openDetail(sessionId) {
  const s = sessions.find(s => s.id===sessionId);
  if (!s) return;
  selectedCert = null;
  const spots = Number(s.spotsLeft);
  const uncertLeft = Math.max(0, MAX_UNCERT - Number(s.uncertCount||0));

  let actionHTML = '';
  if (s.enrolled) {
    const certLabel = s.certLevel ? certName(s.certLevel) : '';
    actionHTML = `
      <div class="enrolled-banner">${IC.check}<span>您已報名${certLabel?' · '+certLabel:''}</span></div>
      <button class="btn btn-red" onclick="cancelEnroll('${s.id}')">取消報名</button>`;
  } else if (spots <= 0 && uncertLeft <= 0) {
    actionHTML = `<button class="btn btn-outline" disabled>名額已滿</button>`;
  } else {
    actionHTML = `
      <div style="font-size:11px;color:var(--t3);margin-bottom:8px;font-weight:700;letter-spacing:.3px">選擇您的證照等級</div>
      <div class="select-grid" id="cert-grid">
        <button class="select-btn ${uncertLeft<=0?'disabled':''}" ${uncertLeft<=0?'disabled':''} onclick="selectCert('無證',this)">
          <span class="sb-name">無 證</span>
          <span class="sb-sub">${uncertLeft<=0?'名額已滿':uncertLeft+'/'+MAX_UNCERT+' 位剩餘'}</span>
        </button>
        <button class="select-btn ${spots<=0?'disabled':''}" ${spots<=0?'disabled':''} onclick="selectCert('A1',this)">
          <span class="sb-name">A1</span>
          <span class="sb-sub">${spots<=0?'名額已滿':'開放中'}</span>
        </button>
        <button class="select-btn ${spots<=0?'disabled':''}" ${spots<=0?'disabled':''} onclick="selectCert('A2pool',this)">
          <span class="sb-name">A2 Pool</span>
          <span class="sb-sub">${spots<=0?'名額已滿':'開放中'}</span>
        </button>
        <button class="select-btn ${spots<=0?'disabled':''}" ${spots<=0?'disabled':''} onclick="selectCert('A2',this)">
          <span class="sb-name">A2</span>
          <span class="sb-sub">${spots<=0?'名額已滿':'開放中'}</span>
        </button>
      </div>
      <button class="btn btn-teal" id="session-enroll-btn" onclick="enroll('${s.id}')" disabled style="opacity:.32">請先選擇證照等級</button>`;
  }

  document.getElementById('modal-inner').innerHTML = `
    <div class="modal-title">${esc(s.title)}</div>
    <div class="modal-section">
      <h4>活動資訊</h4>
      <div class="detail-row"><div class="detail-icon">${IC.cal}</div><div class="detail-text">${s.date}${s.time?' · '+s.time:''}</div></div>
      <div class="detail-row"><div class="detail-icon">${IC.person}</div><div class="detail-text">教練：${esc(s.coach)||'—'}</div></div>
      <div class="detail-row"><div class="detail-icon">${IC.price}</div><div class="detail-text">${s.price?'NT$ '+s.price:'免費'}</div></div>
      <div class="detail-row"><div class="detail-icon">${IC.people}</div><div class="detail-text">無證名額：${uncertLeft}/${MAX_UNCERT}&nbsp;&nbsp;有證名額：${spots>0?'開放':'已滿'}</div></div>
    </div>
    ${s.meetingPoint?`<div class="modal-section"><h4>集合地點</h4><div class="meeting-box"><div class="label">請在此集合</div><div class="value">${esc(s.meetingPoint)}</div></div></div>`:''}
    ${s.location?`<div class="modal-section"><h4>地點</h4><div class="detail-row"><div class="detail-icon">${IC.pin}</div><div class="detail-text">${esc(s.location)}</div></div></div>`:''}
    ${s.description?`<div class="modal-section"><h4>活動說明</h4><div class="desc-box">${esc(s.description)}</div></div>`:''}
    <div class="modal-actions">${actionHTML}<button class="btn btn-outline" onclick="closeModal()">關閉</button></div>`;

  document.getElementById('detail-modal').style.display = 'flex';
}

function selectCert(cert, btn) {
  if (btn.disabled) return;
  selectedCert = cert;
  document.querySelectorAll('#cert-grid .select-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  const enrollBtn = document.getElementById('session-enroll-btn');
  if (enrollBtn) { enrollBtn.disabled = false; enrollBtn.style.opacity='1'; enrollBtn.textContent = '立即報名 · ' + certName(cert); }
}

function certName(c) {
  return {'無證':'無 證','A1':'A1 證照','A2pool':'A2 Pool','A2':'A2 證照'}[c]||c;
}

// ── Trip List ─────────────────────────────────────
function renderTripList() {
  const el = document.getElementById('trip-list');
  if (!trips.length) {
    el.innerHTML = `<div class="empty">${IC.plane}<p>目前沒有旅行行程<br>請持續關注！</p></div>`;
    return;
  }
  el.innerHTML = trips.map(t => tripCardHTML(t)).join('');
}

function tripCardHTML(t) {
  const spots = Number(t.spotsLeft);
  const spotsClass = spots<=0?'spots-full':spots<=3?'spots-few':'spots-ok';
  const spotsLabel = spots<=0?'名額已滿':`剩 ${spots} 位`;
  const dateRange = t.startDate?(t.endDate?`${t.startDate} ～ ${t.endDate}`:t.startDate):'日期待定';
  return `
    <div class="trip-card ${t.enrolled?'enrolled':''}" onclick="openTripDetail('${t.id}')">
      <div class="trip-country">${IC.pin} ${esc(t.country||'—')}</div>
      <div class="sc-header">
        <div class="trip-title">${esc(t.title)}</div>
        ${t.enrolled?`<div class="enrolled-indicator"><div class="ei-dot"></div><span>已報名</span></div>`:''}
      </div>
      <div class="trip-dates">${IC.cal} ${dateRange}</div>
      <div class="trip-price-row">
        ${t.priceSingle?`<div class="price-tag"><span class="pt-label">單人</span><span class="pt-amt">NT$ ${Number(t.priceSingle).toLocaleString()}</span></div>`:''}
        ${t.priceCouple?`<div class="price-tag"><span class="pt-label">雙人</span><span class="pt-amt">NT$ ${Number(t.priceCouple).toLocaleString()}</span></div>`:''}
      </div>
      <div class="trip-footer">
        <span class="spots-badge ${spotsClass}">${spotsLabel}</span>
        <span class="trip-no-flight">${IC.plane} 機票自理</span>
      </div>
    </div>`;
}

function myTripCardHTML(t) {
  const dateRange = t.startDate?(t.endDate?`${t.startDate} ～ ${t.endDate}`:t.startDate):'日期待定';
  const planLabel = t.myPlan==='couple'?'雙人團報':'單人方案';
  const price = t.myPlan==='couple'?t.priceCouple:t.priceSingle;
  return `
    <div class="trip-card enrolled">
      <div class="trip-country">${IC.pin} ${esc(t.country||'—')}</div>
      <div class="trip-title">${esc(t.title)}</div>
      <div class="trip-dates">${IC.cal} ${dateRange}</div>
      <div class="enrolled-banner" style="margin-top:8px">${IC.check}<span>${planLabel}${price?' · NT$ '+Number(price).toLocaleString():''}</span></div>
      <div style="margin-top:10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        ${paymentStatusBadge(t.paymentStatus)}
        ${t.transferCode?`<span style="font-size:10px;color:var(--t3);font-weight:600">匯款末5碼：<span style="color:var(--t2);font-weight:800">${esc(t.transferCode)}</span></span>`:''}
      </div>
      <div style="margin-top:12px">
        <button class="btn-sm" style="border-color:rgba(192,69,69,.5);color:var(--red)" onclick="cancelTripEnroll('${t.id}')">取消報名</button>
      </div>
    </div>`;
}

// ── Trip Detail ───────────────────────────────────
function openTripDetail(tripId) {
  const t = trips.find(t => t.id===tripId);
  if (!t) return;
  selectedPlan = null;
  const spots = Number(t.spotsLeft);
  const dateRange = t.startDate?(t.endDate?`${t.startDate} ～ ${t.endDate}`:t.startDate):'日期待定';

  let actionHTML = '';
  if (t.enrolled) {
    const planLabel = t.myPlan==='couple'?'雙人團報':'單人方案';
    actionHTML = `
      <div class="enrolled-banner">${IC.check}<span>您已報名 · ${planLabel}</span></div>
      <button class="btn btn-red" onclick="cancelTripEnroll('${t.id}')">取消報名</button>`;
  } else if (spots <= 0) {
    actionHTML = `<button class="btn btn-outline" disabled>名額已滿</button>`;
  } else {
    const hasBoth = t.priceSingle && t.priceCouple;
    actionHTML = `
      <div style="font-size:11px;color:var(--t3);margin-bottom:8px;font-weight:700;letter-spacing:.3px">選擇方案</div>
      <div class="select-grid" id="plan-grid" style="grid-template-columns:${hasBoth?'1fr 1fr':'1fr'}">
        ${t.priceSingle?`<button class="select-btn" onclick="selectPlan('single',this)"><span class="sb-name">單人方案</span><span class="sb-sub">NT$ ${Number(t.priceSingle).toLocaleString()}</span></button>`:''}
        ${t.priceCouple?`<button class="select-btn" onclick="selectPlan('couple',this)"><span class="sb-name">雙人團報</span><span class="sb-sub">NT$ ${Number(t.priceCouple).toLocaleString()}/人</span></button>`:''}
      </div>
      <button class="btn btn-teal" id="trip-enroll-btn" onclick="enrollTrip('${t.id}')" disabled style="opacity:.32">請先選擇方案</button>`;
  }

  document.getElementById('modal-inner').innerHTML = `
    <div style="font-size:10px;color:var(--t3);font-weight:800;letter-spacing:.8px;text-transform:uppercase;margin-bottom:6px;display:flex;align-items:center;gap:4px">${IC.pin} ${esc(t.country||'—')}</div>
    <div class="modal-title">${esc(t.title)}</div>
    <div class="modal-section">
      <h4>行程資訊</h4>
      <div class="detail-row"><div class="detail-icon">${IC.cal}</div><div class="detail-text">${dateRange}</div></div>
      <div class="detail-row"><div class="detail-icon">${IC.people}</div><div class="detail-text">剩餘名額：${spots}${t.maxSpots?'/'+t.maxSpots:''} 位</div></div>
      <div class="detail-row"><div class="detail-icon">${IC.plane}</div><div class="detail-text" style="color:var(--gold)">機票費用自理（不含機票）</div></div>
    </div>
    <div class="modal-section">
      <h4>費用方案</h4>
      ${t.priceSingle?`<div class="detail-row"><div class="detail-icon">${IC.person}</div><div class="detail-text">單人方案：<strong style="color:var(--gold)">NT$ ${Number(t.priceSingle).toLocaleString()}</strong></div></div>`:''}
      ${t.priceCouple?`<div class="detail-row"><div class="detail-icon">${IC.people}</div><div class="detail-text">雙人團報：<strong style="color:var(--gold)">NT$ ${Number(t.priceCouple).toLocaleString()}</strong>/人</div></div>`:''}
    </div>
    ${t.itinerary?`<div class="modal-section"><h4>詳細行程</h4><div class="desc-box">${esc(t.itinerary)}</div></div>`:''}
    ${t.inclusions?`<div class="modal-section"><h4>費用包含</h4><div class="desc-box">${esc(t.inclusions)}</div></div>`:''}
    ${t.notes?`<div class="modal-section"><h4>備註</h4><div class="desc-box">${esc(t.notes)}</div></div>`:''}
    <div class="modal-actions">${actionHTML}<button class="btn btn-outline" onclick="closeModal()">關閉</button></div>`;

  document.getElementById('detail-modal').style.display = 'flex';
}

function selectPlan(plan, btn) {
  selectedPlan = plan;
  document.querySelectorAll('#plan-grid .select-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  const enrollBtn = document.getElementById('trip-enroll-btn');
  if (enrollBtn) { enrollBtn.disabled = false; enrollBtn.style.opacity='1'; enrollBtn.textContent = '報名 · '+(plan==='couple'?'雙人團報':'單人方案'); }
}

function closeModal(e) {
  if (!e || e.target===document.getElementById('detail-modal')) {
    document.getElementById('detail-modal').style.display = 'none';
    selectedCert = null; selectedPlan = null;
  }
}

// ── Enroll ────────────────────────────────────────
function enroll(sessionId) {
  if (!selectedCert) { toast('請先選擇證照等級', 'error'); return; }
  const s = sessions.find(s=>s.id===sessionId);
  document.getElementById('modal-inner').innerHTML = `
    <div class="modal-title">確認報名</div>
    <div class="modal-section">
      <h4>報名摘要</h4>
      <div class="detail-row"><div class="detail-icon">${IC.book}</div><div class="detail-text">${esc(s?.title||'')}</div></div>
      <div class="detail-row"><div class="detail-icon">${IC.cal}</div><div class="detail-text">${s?.date||''}${s?.time?' · '+s.time:''}</div></div>
      <div class="detail-row"><div class="detail-icon">${IC.card}</div><div class="detail-text">證照等級：${certName(selectedCert)}</div></div>
      ${s?.price?`<div class="detail-row"><div class="detail-icon">${IC.price}</div><div class="detail-text">費用：NT$ ${s.price}</div></div>`:''}
    </div>
    <div class="modal-section">
      <h4>匯款資訊</h4>
      <div class="bank-box">
        <div class="bb-label">請匯款至以下帳戶</div>
        <div class="bb-bank">玉山銀行（808）</div>
        <div class="bb-num">0772 9760 15466</div>
      </div>
      <div class="field">
        <label>匯款後五碼</label>
        <input id="transfer-code-input" placeholder="請輸入您匯款帳號後五碼" maxlength="5" type="text" inputmode="numeric" pattern="[0-9]*">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-teal" id="confirm-enroll-btn" onclick="submitEnroll('${sessionId}')">確認報名</button>
      <button class="btn btn-outline" onclick="openDetail('${sessionId}')">返回</button>
    </div>`;
}

async function submitEnroll(sessionId) {
  const transferCode = (document.getElementById('transfer-code-input')?.value || '').trim();
  if (!transferCode) { toast('請輸入匯款後五碼', 'error'); return; }
  if (!/^\d{5}$/.test(transferCode)) { toast('請輸入5位數字', 'error'); return; }
  const confirmBtn = document.getElementById('confirm-enroll-btn');
  if (confirmBtn) { confirmBtn.disabled = true; confirmBtn.textContent = '報名中…'; }
  const res = await api({ action:'enrollSession', lineUid:profile.userId, sessionId, certLevel:selectedCert, transferCode });
  if (res.ok) {
    const s = sessions.find(s=>s.id===sessionId);
    if (s) {
      s.enrolled = true; s.certLevel = selectedCert;
      s.spotsLeft = Math.max(0, Number(s.spotsLeft)-1);
      if (selectedCert === '無證') s.uncertCount = (Number(s.uncertCount)||0)+1;
    }
    document.getElementById('modal-inner').innerHTML = `
      <div class="modal-title" style="color:var(--teal)">報名成功</div>
      <div class="modal-section">
        <div class="success-box">
          <div class="sb-check">${IC.check}</div>
          <div class="sb-title">${esc(s?.title||'')}</div>
          <div class="sb-sub">${certName(selectedCert)}</div>
          <div class="sb-divider">
            匯款帳戶：玉山銀行（808）0772976015466<br>
            匯款後五碼：<span style="color:var(--teal);font-weight:800">${esc(transferCode)}</span>
          </div>
        </div>
      </div>
      <div class="modal-actions"><button class="btn btn-outline" onclick="closeModal()">關閉</button></div>`;
    renderTab(currentTab);
  } else {
    toast(res.error||'報名失敗', 'error');
    if (confirmBtn) { confirmBtn.disabled = false; confirmBtn.textContent = '確認報名'; }
  }
}

async function cancelEnroll(sessionId) {
  if (!confirm('確認取消報名？')) return;
  const res = await api({ action:'cancelEnroll', lineUid:profile.userId, sessionId });
  if (res.ok) {
    const s = sessions.find(s=>s.id===sessionId);
    if (s) { s.enrolled = false; s.spotsLeft = Number(s.spotsLeft)+1; if(s.certLevel==='無證')s.uncertCount=Math.max(0,(s.uncertCount||0)-1); }
    closeModal(); toast('已取消報名', 'success'); renderTab(currentTab);
  } else toast(res.error||'取消失敗', 'error');
}

async function enrollTrip(tripId) {
  if (!selectedPlan) { toast('請先選擇方案', 'error'); return; }
  const btn = document.getElementById('trip-enroll-btn');
  if (btn) { btn.disabled = true; btn.textContent = '報名中…'; }
  const res = await api({ action:'enrollTrip', lineUid:profile.userId, tripId, plan:selectedPlan });
  if (res.ok) {
    const t = trips.find(t=>t.id===tripId);
    if (t) { t.enrolled = true; t.myPlan = selectedPlan; t.spotsLeft = Math.max(0, Number(t.spotsLeft)-1); }
    closeModal(); toast('旅行報名成功', 'success'); renderTab(currentTab);
  } else {
    toast(res.error||'報名失敗', 'error');
    if (btn) { btn.disabled = false; btn.style.opacity='1'; }
  }
}

async function cancelTripEnroll(tripId) {
  if (!confirm('確認取消旅行報名？')) return;
  const res = await api({ action:'cancelTripEnroll', lineUid:profile.userId, tripId });
  if (res.ok) {
    const t = trips.find(t=>t.id===tripId);
    if (t) { t.enrolled = false; t.myPlan = null; t.spotsLeft = Number(t.spotsLeft)+1; }
    closeModal(); toast('已取消旅行報名', 'success'); renderTab(currentTab);
  } else toast(res.error||'取消失敗', 'error');
}

// ── Utils ─────────────────────────────────────────
async function api(data) {
  try {
    const r = await fetch(GAS_URL, { method:'POST', body:JSON.stringify(data) });
    return r.json();
  } catch(e) { return {ok:false,error:'網路錯誤'}; }
}

function toast(msg, type='success') {
  const el = document.createElement('div');
  el.className = 'toast '+type; el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function paymentStatusBadge(status) {
  if (status === 'paid') return `<span style="font-size:10px;font-weight:700;background:rgba(0,201,177,.12);border:1px solid rgba(0,201,177,.3);color:var(--teal);border-radius:6px;padding:2px 8px">✓ 已確認繳費</span>`;
  if (status === 'pending') return `<span style="font-size:10px;font-weight:700;background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.3);color:var(--gold);border-radius:6px;padding:2px 8px">⏳ 待確認</span>`;
  return `<span style="font-size:10px;font-weight:700;background:rgba(192,69,69,.12);border:1px solid rgba(192,69,69,.3);color:var(--red);border-radius:6px;padding:2px 8px">未繳費</span>`;
}

init();
</script>
</body>
</html>
