<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>HertzQuest 教練後台</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, 'Noto Sans TC', sans-serif; background: #0A1628; color: #F0F0FF; min-height: 100vh; }

#login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 32px 20px; }
.logo-area { text-align: center; margin-bottom: 36px; }
.logo-area h1 { font-size: 26px; font-weight: 900; color: #00C9B1; }
.logo-area p  { font-size: 14px; color: #7FBBCC; margin-top: 6px; }
.login-card { background: #0D2240; border: 1px solid #1E4060; border-radius: 20px; padding: 32px 24px; width: 100%; max-width: 380px; }
.login-card label { font-size: 13px; color: #7FBBCC; display: block; margin-bottom: 6px; }
.login-card input { width: 100%; background: #112840; border: 1px solid #1E4060; border-radius: 10px; padding: 14px 16px; font-size: 16px; color: #F0F0FF; outline: none; margin-bottom: 20px; }
.login-card input:focus { border-color: #00C9B1; }

#main-screen { display: none; }
.top-bar { background: #0D2240; border-bottom: 1px solid #1E4060; padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.top-bar h1 { font-size: 17px; font-weight: 700; color: #00C9B1; }
.logout-btn { background: none; border: 1px solid #1E4060; color: #7FBBCC; border-radius: 8px; padding: 6px 14px; font-size: 13px; cursor: pointer; }

.tab-bar { display: flex; background: #0D2240; border-bottom: 1px solid #1E4060; overflow-x: auto; scrollbar-width: none; }
.tab-bar::-webkit-scrollbar { display: none; }
.tab-btn { flex: 1; min-width: 72px; padding: 12px 6px; font-size: 12px; font-weight: 600; color: #7FBBCC; background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; white-space: nowrap; text-align: center; }
.tab-btn.active { color: #00C9B1; border-bottom-color: #00C9B1; }
.tab-content { display: none; padding: 20px; }
.tab-content.active { display: block; }

.card { background: #0D2240; border: 1px solid #1E4060; border-radius: 16px; padding: 20px; margin-bottom: 14px; }
.card-title { font-size: 14px; font-weight: 700; color: #00C9B1; margin-bottom: 16px; }

.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 12px; color: #7FBBCC; margin-bottom: 5px; }
.form-group input, .form-group textarea, .form-group select { width: 100%; background: #112840; border: 1px solid #1E4060; border-radius: 10px; padding: 12px 14px; font-size: 14px; color: #F0F0FF; outline: none; font-family: inherit; }
.form-group input:focus, .form-group textarea:focus { border-color: #00C9B1; }
.form-group textarea { resize: vertical; min-height: 80px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

.btn { display: inline-block; padding: 12px 20px; border-radius: 12px; font-size: 14px; font-weight: 700; cursor: pointer; border: none; text-align: center; }
.btn-primary { background: #00C9B1; color: #0A1628; width: 100%; padding: 16px; font-size: 16px; }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-danger  { background: rgba(224,80,80,0.15); border: 1px solid #E05050; color: #E05050; }
.btn-ghost   { background: rgba(0,201,177,0.1); border: 1px solid #00C9B1; color: #00C9B1; }
.btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 8px; }

.session-card { background: #112840; border: 1px solid #1E4060; border-radius: 14px; padding: 16px; margin-bottom: 12px; }
.session-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 10px; }
.session-title { font-size: 15px; font-weight: 700; }
.session-badge { font-size: 11px; padding: 3px 8px; border-radius: 6px; white-space: nowrap; flex-shrink: 0; }
.badge-open   { background: rgba(0,201,177,0.15); color: #00C9B1; border: 1px solid #00C9B1; }
.badge-closed { background: rgba(100,100,120,0.15); color: #7FBBCC; border: 1px solid #3A5070; }
.session-meta { font-size: 12px; color: #7FBBCC; line-height: 1.9; }
.session-meta span { display: block; }
.meet-point { color: #00C9B1; font-weight: 600; }
.session-stats { display: flex; gap: 12px; margin-top: 10px; padding-top: 10px; border-top: 1px solid #1E4060; }
.stat-box { flex: 1; text-align: center; }
.stat-box .num { font-size: 20px; font-weight: 900; color: #FFB030; }
.stat-box .lbl { font-size: 10px; color: #7FBBCC; margin-top: 2px; }
.session-actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }

/* cert summary bar */
.cert-bar { display: grid; grid-template-columns: repeat(4,1fr); gap: 6px; margin-top: 10px; padding: 10px; background: rgba(0,0,0,.2); border-radius: 10px; }
.cert-bar-item { text-align: center; }
.cert-bar-num { font-size: 15px; font-weight: 900; }
.cert-bar-lbl { font-size: 9px; color: #7FBBCC; margin-top: 1px; }
.uncert-warn { font-size: 11px; color: #E05050; text-align: center; margin-top: 6px; }

.trip-card { background: #112840; border: 1px solid #1E4060; border-radius: 14px; padding: 16px; margin-bottom: 12px; }
.trip-country-lbl { font-size: 11px; color: #7FBBCC; font-weight: 700; margin-bottom: 4px; }
.trip-title-h { font-size: 15px; font-weight: 700; }
.trip-info { font-size: 12px; color: #7FBBCC; margin-top: 4px; }
.price-tags { display: flex; gap: 8px; flex-wrap: wrap; margin: 8px 0; }
.price-tag { font-size: 11px; background: rgba(255,176,48,.1); border: 1px solid rgba(255,176,48,.3); color: #FFB030; border-radius: 8px; padding: 3px 10px; }

.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; align-items: flex-end; }
.modal-overlay.show { display: flex; }
.modal-sheet { background: #0D2240; border: 1px solid #1E4060; border-radius: 24px 24px 0 0; padding: 24px 20px; width: 100%; max-height: 80vh; overflow-y: auto; }
.modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.modal-header h3 { font-size: 16px; font-weight: 700; }
.modal-close { font-size: 22px; cursor: pointer; color: #7FBBCC; background: none; border: none; }
.member-row { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid #1E4060; gap: 12px; }
.member-row:last-child { border-bottom: none; }
.member-avatar { width: 40px; height: 40px; border-radius: 50%; background: #1E4060; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 700; color: #00C9B1; flex-shrink: 0; }
.member-info { flex: 1; }
.member-name { font-size: 14px; font-weight: 600; }
.member-phone { font-size: 12px; color: #7FBBCC; }
.member-date { font-size: 11px; color: #3A5070; margin-top: 2px; }
.cert-badge { font-size: 11px; padding: 2px 8px; border-radius: 6px; background: rgba(0,201,177,.1); border: 1px solid rgba(0,201,177,.3); color: #00C9B1; white-space: nowrap; flex-shrink: 0; }
.plan-badge { font-size: 11px; padding: 2px 8px; border-radius: 6px; background: rgba(255,176,48,.1); border: 1px solid rgba(255,176,48,.3); color: #FFB030; white-space: nowrap; flex-shrink: 0; }

.notify-area { margin-top: 16px; }
.notify-area textarea { width: 100%; background: #112840; border: 1px solid #1E4060; border-radius: 10px; padding: 12px; font-size: 14px; color: #F0F0FF; min-height: 100px; resize: vertical; font-family: inherit; outline: none; }
.notify-area textarea:focus { border-color: #00C9B1; }

.toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #1A3A5C; border: 1px solid #00C9B1; color: #00C9B1; padding: 12px 24px; border-radius: 40px; font-size: 14px; font-weight: 600; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; }
.toast.error { border-color: #E05050; color: #E05050; background: #1A1020; }
.toast.show { opacity: 1; }
.empty-state { text-align: center; padding: 48px 20px; color: #3A5070; font-size: 14px; }

.toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 4px 0; }
.toggle-row label { font-size: 13px; color: #7FBBCC; }
.toggle { position: relative; width: 46px; height: 26px; }
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle-slider { position: absolute; inset: 0; background: #1E4060; border-radius: 26px; cursor: pointer; transition: 0.2s; }
.toggle-slider:before { content: ''; position: absolute; height: 20px; width: 20px; left: 3px; top: 3px; background: #7FBBCC; border-radius: 50%; transition: 0.2s; }
.toggle input:checked + .toggle-slider { background: #00C9B1; }
.toggle input:checked + .toggle-slider:before { transform: translateX(20px); background: #0A1628; }

.loading-spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid #1E4060; border-top-color: #00C9B1; border-radius: 50%; animation: spin .6s linear infinite; margin-right: 8px; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Member approval & stats */
.approval-badge { display: inline-block; font-size: 11px; font-weight: 700; border-radius: 8px; padding: 2px 9px; border: 1px solid; white-space: nowrap; }
.approval-pending  { background: rgba(255,176,48,.15); border-color: rgba(255,176,48,.5); color: #FFB030; }
.approval-approved { background: rgba(0,201,177,.15); border-color: rgba(0,201,177,.5); color: #00C9B1; }
.approval-rejected { background: rgba(224,80,80,.15); border-color: rgba(224,80,80,.5); color: #E05050; }

.member-card { background: #112840; border: 1px solid #1E4060; border-radius: 14px; padding: 16px; margin-bottom: 12px; }
.member-card.pending-card { border-color: rgba(255,176,48,.4); }
.member-card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 8px; }
.member-card-name { font-size: 15px; font-weight: 700; }
.member-card-meta { font-size: 12px; color: #7FBBCC; line-height: 1.8; }
.member-card-actions { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }

.stats-edit-panel { display: none; background: rgba(0,0,0,.25); border: 1px solid #1E4060; border-radius: 12px; padding: 14px; margin-top: 10px; }
.stats-edit-panel.open { display: block; }
.stats-edit-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.stats-edit-panel input, .stats-edit-panel select {
  width: 100%; background: #112840; border: 1px solid #1E4060; border-radius: 8px;
  padding: 9px 12px; font-size: 13px; color: #F0F0FF; outline: none; font-family: inherit; }
.stats-edit-panel input:focus, .stats-edit-panel select:focus { border-color: #00C9B1; }
.stats-edit-panel label { font-size: 11px; color: #7FBBCC; display: block; margin-bottom: 4px; }
.stats-edit-panel select option { background: #112840; }
</style>
</head>
<body>

<div id="login-screen">
  <div class="logo-area">
    <h1>HertzQuest 教練後台</h1>
    <p>團練系統管理</p>
  </div>
  <div class="login-card">
    <label>教練密碼</label>
    <input type="password" id="pwd-input" placeholder="請輸入密碼" onkeydown="if(event.key==='Enter')login()">
    <button class="btn btn-primary" onclick="login()" id="login-btn">登入</button>
    <div id="login-err" style="color:#E05050;font-size:13px;text-align:center;margin-top:12px;display:none"></div>
  </div>
</div>

<div id="main-screen">
  <div class="top-bar">
    <h1>HertzQuest 教練後台</h1>
    <button class="logout-btn" onclick="logout()">登出</button>
  </div>

  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('sessions')"    id="tab-sessions">活動列表</button>
    <button class="tab-btn" onclick="switchTab('create')"             id="tab-create">新增團練</button>
    <button class="tab-btn" onclick="switchTab('trips')"              id="tab-trips">🤿 旅行</button>
    <button class="tab-btn" onclick="switchTab('create-trip')"        id="tab-create-trip">新增旅行</button>
    <button class="tab-btn" onclick="switchTab('members')"            id="tab-members">學員名單</button>
    <button class="tab-btn" onclick="switchTab('announcements')"      id="tab-announcements">📢 公告</button>
  </div>

  <!-- 活動列表 -->
  <div id="panel-sessions" class="tab-content active">
    <div id="sessions-list"></div>
  </div>

  <!-- 新增團練 -->
  <div id="panel-create" class="tab-content">
    <div class="card">
      <div class="card-title">新增團練</div>
      <div class="form-group"><label>活動標題 *</label><input type="text" id="f-title" placeholder="例：週六晨泳特訓"></div>
      <div class="form-row">
        <div class="form-group"><label>日期 *</label><input type="date" id="f-date"></div>
        <div class="form-group"><label>時間</label><input type="time" id="f-time"></div>
      </div>
      <div class="form-group"><label>地點</label><input type="text" id="f-location" placeholder="例：潛立方"></div>
      <div class="form-group"><label>詳細集合地點</label><input type="text" id="f-meet" placeholder="例：一樓大廳"></div>
      <div class="form-group"><label>活動說明</label><textarea id="f-desc" placeholder="訓練內容、注意事項…"></textarea></div>
      <div class="form-row">
        <div class="form-group"><label>負責教練</label><input type="text" id="f-coach" placeholder="教練姓名"></div>
        <div class="form-group"><label>費用（NT$）</label><input type="number" id="f-price" placeholder="0 免費" min="0"></div>
      </div>
      <div class="form-group">
        <label>有證名額上限（無證固定 4 位）</label>
        <input type="number" id="f-max" placeholder="預設 2" min="0" max="50">
      </div>
      <button class="btn btn-primary" id="create-btn" onclick="createSession()">建立團練</button>
    </div>
  </div>

  <!-- 潛水旅行列表 -->
  <div id="panel-trips" class="tab-content">
    <div id="trips-list"></div>
  </div>

  <!-- 新增旅行 -->
  <div id="panel-create-trip" class="tab-content">
    <div class="card">
      <div class="card-title">新增潛水旅行</div>
      <div class="form-group"><label>旅行標題 *</label><input type="text" id="ft-title" placeholder="例：帛琉藍色珊瑚礁之旅"></div>
      <div class="form-group"><label>國家 / 地區 *</label><input type="text" id="ft-country" placeholder="例：帛琉 Palau"></div>
      <div class="form-row">
        <div class="form-group"><label>出發日期</label><input type="date" id="ft-start"></div>
        <div class="form-group"><label>回程日期</label><input type="date" id="ft-end"></div>
      </div>
      <div class="form-group"><label>詳細行程</label><textarea id="ft-itinerary" style="min-height:120px" placeholder="Day 1：抵達後辦理 Check-in…&#10;Day 2：上午潛水兩支…"></textarea></div>
      <div class="form-group"><label>費用包含</label><textarea id="ft-inclusions" placeholder="住宿、潛水費用、潛水器材租借、教練費…&#10;（不含機票）"></textarea></div>
      <div class="form-row">
        <div class="form-group"><label>單人費用（NT$）*</label><input type="number" id="ft-price-single" placeholder="例：25000" min="0"></div>
        <div class="form-group"><label>雙人團報（NT$/人）</label><input type="number" id="ft-price-couple" placeholder="例：22000" min="0"></div>
      </div>
      <div class="form-group"><label>名額上限</label><input type="number" id="ft-max" placeholder="預設 20" min="1"></div>
      <div class="form-group"><label>備註</label><textarea id="ft-notes" placeholder="集合地點、行前說明…"></textarea></div>
      <button class="btn btn-primary" id="create-trip-btn" onclick="createTrip()">建立旅行</button>
    </div>
  </div>

  <!-- 學員名單 -->
  <div id="panel-members" class="tab-content">
    <div class="card">
      <div class="card-title">已登記學員</div>
      <div id="members-list"></div>
    </div>
  </div>

  <!-- 公告管理 -->
  <div id="panel-announcements" class="tab-content">
    <div class="card">
      <div class="card-title">新增公告</div>
      <div class="form-group">
        <label>公告內容 *</label>
        <textarea id="ann-text" placeholder="輸入公告文字…" style="min-height:80px"></textarea>
      </div>
      <div class="toggle-row" style="margin-bottom:14px">
        <label>立即顯示（active）</label>
        <label class="toggle"><input type="checkbox" id="ann-active" checked><span class="toggle-slider"></span></label>
      </div>
      <button class="btn btn-primary" id="ann-create-btn" onclick="createAnnouncementAction()">新增公告</button>
    </div>
    <div class="card">
      <div class="card-title">公告列表</div>
      <div id="announcements-list"></div>
    </div>
  </div>
</div>

<!-- 團練報名名單 -->
<div class="modal-overlay" id="enroll-modal" onclick="closeModal(event)">
  <div class="modal-sheet">
    <div class="modal-header">
      <h3 id="modal-title">報名名單</h3>
      <button class="modal-close" onclick="closeEnrollModal()">✕</button>
    </div>
    <div id="modal-count" style="font-size:13px;color:#7FBBCC;margin-bottom:10px"></div>
    <div id="modal-cert-bar"></div>
    <div id="modal-list"></div>
    <div class="notify-area">
      <div style="font-size:13px;color:#7FBBCC;margin-bottom:8px;margin-top:16px">發送 LINE 通知</div>
      <textarea id="notify-text" placeholder="輸入要發送的訊息…"></textarea>
      <button class="btn btn-ghost" style="width:100%;margin-top:10px" onclick="sendNotify()">發送通知</button>
    </div>
  </div>
</div>

<!-- 旅行報名名單 -->
<div class="modal-overlay" id="trip-modal" onclick="closeTripModalOverlay(event)">
  <div class="modal-sheet">
    <div class="modal-header">
      <h3 id="trip-modal-title">旅行報名名單</h3>
      <button class="modal-close" onclick="closeTripModal()">✕</button>
    </div>
    <div id="trip-modal-count" style="font-size:13px;color:#7FBBCC;margin-bottom:16px"></div>
    <div id="trip-modal-list"></div>
  </div>
</div>

<!-- 編輯活動 -->
<div class="modal-overlay" id="edit-modal" onclick="closeEditModal(event)">
  <div class="modal-sheet" style="padding-bottom:32px">
    <div class="modal-header">
      <h3>編輯活動</h3>
      <button class="modal-close" onclick="closeEditModal()">✕</button>
    </div>
    <div class="form-group"><label>活動標題</label><input type="text" id="ef-title"></div>
    <div class="form-row">
      <div class="form-group"><label>日期</label><input type="date" id="ef-date"></div>
      <div class="form-group"><label>時間</label><input type="time" id="ef-time"></div>
    </div>
    <div class="form-group"><label>地點</label><input type="text" id="ef-location"></div>
    <div class="form-group"><label>詳細集合地點</label><input type="text" id="ef-meet"></div>
    <div class="form-group"><label>活動說明</label><textarea id="ef-desc"></textarea></div>
    <div class="form-row">
      <div class="form-group"><label>負責教練</label><input type="text" id="ef-coach"></div>
      <div class="form-group"><label>費用（NT$）</label><input type="number" id="ef-price"></div>
    </div>
    <div class="form-group"><label>有證名額上限</label><input type="number" id="ef-max"></div>
    <div class="form-group">
      <div class="toggle-row">
        <label>開放報名</label>
        <label class="toggle"><input type="checkbox" id="ef-active"><span class="toggle-slider"></span></label>
      </div>
    </div>
    <button class="btn btn-primary" onclick="saveEdit()">儲存</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzBy8q-19g_uRMbaEKRULHcd9xdp0k9Vv3RN0-5xV76cAGHEybC7Y_R0yYwpfS7G1SP1w/exec';
const MAX_UNCERT = 4;

let pwd = '';
let allSessions = [];
let allTrips = [];
let currentSessionId = '';
let currentTripId = '';

async function login() {
  const p = document.getElementById('pwd-input').value.trim();
  if (!p) return;
  const btn = document.getElementById('login-btn');
  btn.disabled = true; btn.innerHTML = '<span class="loading-spinner"></span>驗證中…';
  document.getElementById('login-err').style.display = 'none';
  const res = await api({ action: 'coachLogin', password: p });
  if (res.ok) {
    pwd = p;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main-screen').style.display  = 'block';
    loadSessions();
  } else {
    document.getElementById('login-err').textContent = res.error || '密碼錯誤';
    document.getElementById('login-err').style.display = 'block';
    btn.disabled = false; btn.textContent = '登入';
  }
}

function logout() {
  pwd = '';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('main-screen').style.display  = 'none';
  document.getElementById('pwd-input').value = '';
}

function switchTab(id) {
  ['sessions','create','trips','create-trip','members','announcements'].forEach(t => {
    document.getElementById('tab-'+t).classList.toggle('active', t===id);
    document.getElementById('panel-'+t).classList.toggle('active', t===id);
  });
  if (id === 'sessions')      loadSessions();
  if (id === 'trips')         loadTrips();
  if (id === 'members')       loadMembers();
  if (id === 'announcements') loadAnnouncements();
}

// ── 活動列表 ──────────────────────────────────────
async function loadSessions() {
  const el = document.getElementById('sessions-list');
  el.innerHTML = '<div class="empty-state"><span class="loading-spinner"></span>載入中…</div>';
  const res = await api({ action: 'allSessions', password: pwd });
  if (!res.ok) { el.innerHTML = `<div class="empty-state">${res.error}</div>`; return; }
  allSessions = res.sessions;
  renderSessions();
}

function renderSessions() {
  const el = document.getElementById('sessions-list');
  if (!allSessions.length) {
    el.innerHTML = '<div class="empty-state">尚無活動，前往「新增團練」建立</div>';
    return;
  }
  el.innerHTML = allSessions.map(s => {
    const uncertCount = Number(s.uncertCount || 0);
    const certCount   = Number(s.enrollCount || 0) - uncertCount;
    const uncertLeft  = Math.max(0, MAX_UNCERT - uncertCount);
    return `
    <div class="session-card">
      <div class="session-header">
        <div class="session-title">${esc(s.title)}</div>
        <span class="session-badge ${s.active?'badge-open':'badge-closed'}">${s.active?'開放報名':'已關閉'}</span>
      </div>
      <div class="session-meta">
        <span>📅 ${s.date}${s.time?' '+s.time:''}</span>
        ${s.location?`<span>📍 ${esc(s.location)}</span>`:''}
        ${s.meetingPoint?`<span class="meet-point">🗺 集合：${esc(s.meetingPoint)}</span>`:''}
        ${s.coach?`<span>👤 教練：${esc(s.coach)}</span>`:''}
        ${s.price?`<span>NT$ ${s.price}</span>`:'<span>免費</span>'}
      </div>
      <div class="session-stats">
        <div class="stat-box"><div class="num">${s.enrollCount||0}</div><div class="lbl">已報名</div></div>
        <div class="stat-box"><div class="num">${s.spotsLeft}</div><div class="lbl">剩餘名額</div></div>
        <div class="stat-box"><div class="num">${s.maxSpots}</div><div class="lbl">名額上限</div></div>
      </div>
      <div class="cert-bar">
        <div class="cert-bar-item">
          <div class="cert-bar-num" style="color:${uncertLeft>0?'#FFB030':'#E05050'}">${uncertCount}/${MAX_UNCERT}</div>
          <div class="cert-bar-lbl">無證</div>
        </div>
        <div class="cert-bar-item"><div class="cert-bar-num" style="color:#00C9B1">${certCount}</div><div class="cert-bar-lbl">有證</div></div>
        <div class="cert-bar-item"><div class="cert-bar-num" style="color:${uncertLeft>0?'#00C9B1':'#E05050'}">${uncertLeft}</div><div class="cert-bar-lbl">無證剩餘</div></div>
        <div class="cert-bar-item"><div class="cert-bar-num" style="color:#00C9B1">${s.spotsLeft}</div><div class="cert-bar-lbl">有證剩餘</div></div>
      </div>
      ${uncertCount >= MAX_UNCERT ? '<div class="uncert-warn">⚠️ 無證名額已滿（4/4）</div>' : ''}
      <div class="session-actions">
        <button class="btn btn-ghost btn-sm" onclick="openEnrollModal('${s.id}','${esc(s.title)}')">查看名單</button>
        <button class="btn btn-ghost btn-sm" onclick="openEditModal('${s.id}')">編輯</button>
        <button class="btn btn-danger btn-sm" onclick="toggleActive('${s.id}',${s.active})">${s.active?'關閉報名':'開放報名'}</button>
        <button class="btn btn-danger btn-sm" onclick="deleteSessionAction('${s.id}','${esc(s.title)}')">🗑 刪除</button>
      </div>
    </div>`;
  }).join('');
}

async function toggleActive(id, current) {
  const res = await api({ action: 'updateSession', password: pwd, sessionId: id, active: !current });
  if (res.ok) { toast('已更新'); loadSessions(); }
  else toast(res.error, true);
}

// ── 新增團練 ──────────────────────────────────────
async function createSession() {
  const title = document.getElementById('f-title').value.trim();
  const date  = document.getElementById('f-date').value;
  if (!title || !date) { toast('請填寫標題和日期', true); return; }
  const btn = document.getElementById('create-btn');
  btn.disabled = true; btn.innerHTML = '<span class="loading-spinner"></span>建立中…';
  const certMax = parseInt(document.getElementById('f-max').value) || 2;
  const totalMax = MAX_UNCERT + certMax;
  const res = await api({
    action: 'createSession', password: pwd, title, date,
    time:         document.getElementById('f-time').value,
    location:     document.getElementById('f-location').value.trim(),
    meetingPoint: document.getElementById('f-meet').value.trim(),
    description:  document.getElementById('f-desc').value.trim(),
    coach:        document.getElementById('f-coach').value.trim(),
    maxSpots:     totalMax,
    certMaxSpots: certMax,
    price:        document.getElementById('f-price').value || 0,
  });
  btn.disabled = false; btn.textContent = '建立團練';
  if (res.ok) {
    toast(res.message || '已建立');
    ['f-title','f-date','f-time','f-location','f-meet','f-desc','f-coach','f-price','f-max'].forEach(id => document.getElementById(id).value = '');
    switchTab('sessions');
  } else toast(res.error || '建立失敗', true);
}

// ── 潛水旅行 ──────────────────────────────────────
async function loadTrips() {
  const el = document.getElementById('trips-list');
  el.innerHTML = '<div class="empty-state"><span class="loading-spinner"></span>載入中…</div>';
  const res = await api({ action: 'getTrips', password: pwd });
  if (!res.ok) { el.innerHTML = `<div class="empty-state">${res.error||'載入失敗'}</div>`; return; }
  allTrips = res.trips || [];
  renderTrips();
}

function renderTrips() {
  const el = document.getElementById('trips-list');
  if (!allTrips.length) {
    el.innerHTML = '<div class="empty-state">尚無旅行，前往「新增旅行」建立</div>';
    return;
  }
  el.innerHTML = allTrips.map(t => {
    const dateRange = t.startDate?(t.endDate?`${t.startDate} ～ ${t.endDate}`:t.startDate):'日期待定';
    const isActive = t.active !== false && t.active !== 'FALSE';
    return `
    <div class="trip-card">
      <div class="trip-country-lbl">📍 ${esc(t.country||'—')}</div>
      <div class="session-header">
        <div class="trip-title-h">${esc(t.title)}</div>
        <span class="session-badge ${isActive?'badge-open':'badge-closed'}">${isActive?'開放中':'已關閉'}</span>
      </div>
      <div class="trip-info">🗓 ${dateRange}</div>
      <div class="trip-info" style="color:#5A7A90;margin-top:2px">✈️ 機票費用自理</div>
      <div class="price-tags">
        ${t.priceSingle?`<span class="price-tag">單人 NT$ ${Number(t.priceSingle).toLocaleString()}</span>`:''}
        ${t.priceCouple?`<span class="price-tag">雙人 NT$ ${Number(t.priceCouple).toLocaleString()}/人</span>`:''}
      </div>
      <div class="session-stats">
        <div class="stat-box"><div class="num">${t.enrollCount||0}</div><div class="lbl">已報名</div></div>
        <div class="stat-box"><div class="num">${t.spotsLeft||0}</div><div class="lbl">剩餘名額</div></div>
        <div class="stat-box"><div class="num">${t.maxSpots||'—'}</div><div class="lbl">名額上限</div></div>
      </div>
      <div class="session-actions">
        <button class="btn btn-ghost btn-sm" onclick="openTripModal('${t.id}','${esc(t.title)}')">查看名單</button>
        <button class="btn btn-danger btn-sm" onclick="toggleTripActive('${t.id}',${isActive})">${isActive?'關閉':'開放'}</button>
        <button class="btn btn-danger btn-sm" onclick="deleteTripAction('${t.id}','${esc(t.title)}')">🗑 刪除</button>
      </div>
    </div>`;
  }).join('');
}

async function toggleTripActive(id, current) {
  const res = await api({ action: 'updateTrip', password: pwd, tripId: id, active: !current });
  if (res.ok) { toast('已更新'); loadTrips(); }
  else toast(res.error, true);
}

// ── 新增旅行 ──────────────────────────────────────
async function createTrip() {
  const title   = document.getElementById('ft-title').value.trim();
  const country = document.getElementById('ft-country').value.trim();
  const priceSingle = document.getElementById('ft-price-single').value;
  if (!title || !country || !priceSingle) { toast('請填寫標題、國家和單人費用', true); return; }
  const btn = document.getElementById('create-trip-btn');
  btn.disabled = true; btn.innerHTML = '<span class="loading-spinner"></span>建立中…';
  const res = await api({
    action: 'createTrip', password: pwd, title, country,
    startDate:   document.getElementById('ft-start').value,
    endDate:     document.getElementById('ft-end').value,
    itinerary:   document.getElementById('ft-itinerary').value.trim(),
    inclusions:  document.getElementById('ft-inclusions').value.trim(),
    priceSingle, priceCouple: document.getElementById('ft-price-couple').value || 0,
    maxSpots:    document.getElementById('ft-max').value || 20,
    notes:       document.getElementById('ft-notes').value.trim(),

  btn.disabled = false; btn.textContent = '建立旅行';
  if (res.ok) {
    toast(res.message || '旅行已建立');

    switchTab('trips');
  } else toast(res.error || '建立失敗', true);
}

// ── 報名名單（團練） ──────────────────────────────
async function openEnrollModal(sessionId, title) {
  currentSessionId = sessionId;
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-list').innerHTML = '<div style="text-align:center;padding:20px;color:#7FBBCC"><span class="loading-spinner"></span>載入中…</div>';
  document.getElementById('modal-count').textContent = '';
  document.getElementById('modal-cert-bar').innerHTML = '';
  document.getElementById('notify-text').value = '';
  document.getElementById('enroll-modal').classList.add('show');

  const res = await api({ action: 'getEnrollList', password: pwd, sessionId });
  if (!res.ok) { document.getElementById('modal-list').innerHTML = `<div style="color:#E05050">${res.error}</div>`; return; }
  const list = res.list;
  document.getElementById('modal-count').textContent = `共 ${list.length} 位學員報名`;

  const counts = { '無證':0, 'A1':0, 'A2pool':0, 'A2':0 };
  list.forEach(m => { if (counts[m.certLevel] !== undefined) counts[m.certLevel]++; });
  document.getElementById('modal-cert-bar').innerHTML = `
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:14px;padding:12px;background:#112840;border-radius:12px">
      <div style="text-align:center"><div style="font-size:18px;font-weight:900;color:${counts['無證']>=MAX_UNCERT?'#E05050':'#FFB030'}">${counts['無證']}/${MAX_UNCERT}</div><div style="font-size:10px;color:#7FBBCC">無 證</div></div>
      <div style="text-align:center"><div style="font-size:18px;font-weight:900;color:#00C9B1">${counts.A1}</div><div style="font-size:10px;color:#7FBBCC">A1</div></div>
      <div style="text-align:center"><div style="font-size:18px;font-weight:900;color:#00C9B1">${counts.A2pool}</div><div style="font-size:10px;color:#7FBBCC">A2 Pool</div></div>
      <div style="text-align:center"><div style="font-size:18px;font-weight:900;color:#00C9B1">${counts.A2}</div><div style="font-size:10px;color:#7FBBCC">A2</div></div>
    </div>`;

  if (!list.length) { document.getElementById('modal-list').innerHTML = '<div class="empty-state">尚無學員報名</div>'; return; }
  document.getElementById('modal-list').innerHTML = list.map((m,i) => {
    const eid = esc(m.id||('idx'+i));
    const isPaid = m.paymentStatus === 'confirmed';
    const payHTML = isPaid
      ? `<span style="color:#00C9B1;font-size:12px;font-weight:700">✓ 已收款</span>`
      : `<span style="color:#FFB030;font-size:11px">待收款${m.transferCode?' · 末5碼 '+esc(m.transferCode):''}</span>
         <label style="display:flex;align-items:center;gap:4px;cursor:pointer;margin-top:3px">
           <input type="checkbox" id="pay-cb-${eid}" onchange="confirmPaymentAction('${esc(m.id||'')}','${eid}',this,'${esc(m.lineUid||'')}',currentSessionId,${m.rowIndex||0})" style="width:14px;height:14px;cursor:pointer;accent-color:#00C9B1">
           <span style="font-size:11px;color:#7FBBCC">已收款 ☐</span>
         </label>`;
    return `
    <div class="member-row">
      <div class="member-avatar">${(m.name||'?').charAt(0)}</div>
      <div class="member-info">
        <div class="member-name">${esc(m.name)}</div>
        <div class="member-phone">${esc(m.phone||'')}</div>
        <div class="member-date">報名於 ${fmtDT(m.at)}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0">
        ${m.certLevel?`<span class="cert-badge">${certName(m.certLevel)}</span>`:''}
        <div id="pay-status-${eid}">${payHTML}</div>
        <span style="font-size:12px;color:#7FBBCC">#${i+1}</span>
      </div>
    </div>`;
  }).join('');
}

function closeEnrollModal() { document.getElementById('enroll-modal').classList.remove('show'); }
function closeModal(e) { if (e.target===document.getElementById('enroll-modal')) closeEnrollModal(); }

async function sendNotify() {
  const msg = document.getElementById('notify-text').value.trim();
  if (!msg) { toast('請輸入通知內容', true); return; }
  const res = await api({ action: 'notifyStudents', password: pwd, sessionId: currentSessionId, message: msg });
  if (res.ok) toast(`已發送給 ${res.sent} 位學員`);
  else toast(res.error || '發送失敗', true);
}

// ── 旅行報名名單 ─────────────────────────────────
async function openTripModal(tripId, title) {
  currentTripId = tripId;
  document.getElementById('trip-modal-title').textContent = title;

    <div class="member-row">

      <div class="member-info">
        <div class="member-name">${esc(m.name)}</div>
        <div class="member-phone">${esc(m.phone||'')}</div>
        <div class="member-date">報名於 ${fmtDT(m.at)}</div>
      </div>
      <span class="plan-badge">${m.plan==='couple'?'雙人':'單人'}</span>
      <span style="font-size:12px;color:#7FBBCC">#${i+1}</span>
    </div>`).join('');
}

function closeTripModal() { document.getElementById('trip-modal').classList.remove('show'); }
function closeTripModalOverlay(e) { if (e.target===document.getElementById('trip-modal')) closeTripModal(); }

// ── 編輯活動 ──────────────────────────────────────
function openEditModal(id) {
  const s = allSessions.find(x=>x.id===id);
  if (!s) return;
  currentSessionId = id;
  document.getElementById('ef-title').value    = s.title;
  document.getElementById('ef-date').value     = s.date;
  document.getElementById('ef-time').value     = s.time || '';
  document.getElementById('ef-location').value = s.location || '';
  document.getElementById('ef-meet').value     = s.meetingPoint || '';
  document.getElementById('ef-desc').value     = s.description || '';
  document.getElementById('ef-coach').value    = s.coach || '';
  document.getElementById('ef-price').value    = s.price || '';
  document.getElementById('ef-max').value      = s.certMaxSpots || '';
  document.getElementById('ef-active').checked = s.active;
  document.getElementById('edit-modal').classList.add('show');
}

async function saveEdit() {
  const certMax = parseInt(document.getElementById('ef-max').value) || 2;
  const res = await api({
    action: 'updateSession', password: pwd, sessionId: currentSessionId,
    title:        document.getElementById('ef-title').value.trim(),
    date:         document.getElementById('ef-date').value,
    time:         document.getElementById('ef-time').value,
    location:     document.getElementById('ef-location').value.trim(),
    meetingPoint: document.getElementById('ef-meet').value.trim(),
    description:  document.getElementById('ef-desc').value.trim(),
    coach:        document.getElementById('ef-coach').value.trim(),
    price:        document.getElementById('ef-price').value,
    maxSpots:     MAX_UNCERT + certMax,
    certMaxSpots: certMax,
    active:       document.getElementById('ef-active').checked,
  });
  if (res.ok) { toast('已儲存'); closeEditModal(); loadSessions(); }
  else toast(res.error || '儲存失敗', true);
}

function closeEditModal(e) {
  if (!e || e.target===document.getElementById('edit-modal'))
    document.getElementById('edit-modal').classList.remove('show');
}

// ── 學員名單 ──────────────────────────────────────
async function loadMembers() {
  const el = document.getElementById('members-list');
  el.innerHTML = '<div style="text-align:center;padding:20px;color:#7FBBCC"><span class="loading-spinner"></span>載入中…</div>';
  const res = await api({ action: 'getMembers', password: pwd });
  if (!res.ok) { el.innerHTML = `<div style="color:#E05050">${res.error}</div>`; return; }
  const members = res.members || [];
  if (!members.length) { el.innerHTML = '<div class="empty-state">尚無學員</div>'; return; }

  const pendingCount = members.filter(m => (m.approvalStatus||'pending') === 'pending').length;
  let html = '';
  if (pendingCount) {
    html += `<div style="font-size:12px;color:#FFB030;font-weight:700;margin-bottom:10px;padding:8px 12px;background:rgba(255,176,48,.08);border:1px solid rgba(255,176,48,.3);border-radius:10px">⚠️ 有 ${pendingCount} 位學員待審核</div>`;
  }

  html += members.map(m => {
    const approval = m.approvalStatus || 'pending';
    const approvalClass = approval === 'approved' ? 'approval-approved' : approval === 'rejected' ? 'approval-rejected' : 'approval-pending';
    const approvalLabel = approval === 'approved' ? '已審核' : approval === 'rejected' ? '未通過' : '待審核';
    const mid = esc(m.id);
    return `
    <div class="member-card${approval === 'pending' ? ' pending-card' : ''}" id="mcard-${mid}">
      <div class="member-card-header">
        <div>
          <div class="member-card-name">${esc(m.realName)}</div>
          <div style="margin-top:4px"><span class="approval-badge ${approvalClass}">${approvalLabel}</span>${m.certLevel ? ` <span class="cert-badge">${esc(m.certLevel)}</span>` : ''}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0">
          <div style="font-size:12px;color:#7FBBCC">${esc(m.phone||'')}</div>
          <div style="font-size:11px;color:#3A5070">加入 ${m.joinedAt||'—'}</div>
        </div>
      </div>
      <div class="member-card-meta">
        ${m.displayName ? `<span>LINE：${esc(m.displayName)}</span><br>` : ''}
        ${m.coachName ? `<span>教練：${esc(m.coachName)}</span><br>` : ''}
        ${m.firstClassDate ? `<span>初次上課：${esc(m.firstClassDate)}</span><br>` : ''}
        ${m.depth ? `<span>深度：${esc(m.depth)}</span>  ` : ''}
        ${m.breathHold ? `<span>閉氣：${esc(m.breathHold)}</span><br>` : ''}
        ${m.lineId ? `<span style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">LINE ID：${esc(m.lineId)} <button class="btn btn-ghost btn-sm" style="padding:2px 8px;font-size:10px" onclick="copyText('${esc(m.lineId)}','LINE ID')">複製</button></span>` : ''}
      </div>
      <div class="member-card-actions">
        ${approval === 'pending' ? `
          <button class="btn btn-ghost btn-sm" onclick="approveStudentAction('${mid}', true)">✅ 核准</button>
          <button class="btn btn-danger btn-sm" onclick="approveStudentAction('${mid}', false)">✗ 拒絕</button>
        ` : ''}
        <button class="btn btn-ghost btn-sm" onclick="toggleEditPanel('${mid}')">✏️ 編輯資料</button>
        <button class="btn btn-danger btn-sm" onclick="deleteMemberAction('${mid}','${esc(m.realName)}')">🗑 刪除</button>
      </div>
      <div class="stats-edit-panel" id="edit-panel-${mid}">
        <div style="font-size:12px;font-weight:700;color:#00C9B1;margin-bottom:10px">編輯潛水資料</div>
        <div class="stats-edit-row">
          <div><label>深度（例：30m）</label><input id="edit-depth-${mid}" placeholder="30m" value="${esc(m.depth||'')}"></div>
          <div><label>閉氣時間（例：2:30）</label><input id="edit-breath-${mid}" placeholder="2:30" value="${esc(m.breathHold||'')}"></div>
        </div>
        <div style="margin-bottom:10px">
          <label>證照等級</label>
          <select id="edit-cert-${mid}">
            <option value="">無照</option>
            <option value="AIDA1" ${m.certLevel==='AIDA1'?'selected':''}>AIDA1</option>
            <option value="AIDA2" ${m.certLevel==='AIDA2'?'selected':''}>AIDA2</option>
            <option value="AIDA3" ${m.certLevel==='AIDA3'?'selected':''}>AIDA3</option>
            <option value="AIDA4" ${m.certLevel==='AIDA4'?'selected':''}>AIDA4</option>
            <option value="教練" ${m.certLevel==='教練'?'selected':''}>教練</option>
          </select>
        </div>
        <button class="btn btn-ghost btn-sm" style="width:100%" onclick="updateStudentStatsAction('${mid}')">儲存資料</button>
      </div>
    </div>`;
  }).join('');

  document.getElementById('members-list').innerHTML = html;
}

function toggleEditPanel(memberId) {
  const panel = document.getElementById('edit-panel-' + memberId);
  if (panel) panel.classList.toggle('open');
}

async function approveStudentAction(memberId, approved) {
  const res = await api({ action: 'approveStudent', password: pwd, memberId, approved });
  if (res.ok) { toast(approved ? '✅ 已核准' : '已拒絕'); loadMembers(); }
  else toast(res.error || '操作失敗', true);
}

async function updateStudentStatsAction(memberId) {

  if (res.ok) { toast('資料已儲存'); loadMembers(); }
  else toast(res.error || '儲存失敗', true);
}

function copyText(text, label) {
  const fallback = () => {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove();
    toast((label||'文字') + ' 已複製');
  };
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => toast((label||'文字') + ' 已複製')).catch(fallback);
  } else { fallback(); }
}

async function confirmPaymentAction(enrollId, elemId, checkbox, lineUid, sessionId, rowIndex) {
  checkbox.disabled = true;
  const res = await api({ action: 'confirmPayment', password: pwd, enrollId, lineUid, sessionId, rowIndex });
  if (res.ok) {
    toast('✅ 已標記已收款');

// ── 公告管理 ──────────────────────────────────────
async function loadAnnouncements() {
  const el = document.getElementById('announcements-list');
  el.innerHTML = '<div class="empty-state"><span class="loading-spinner"></span>載入中…</div>';
  const res = await api({ action: 'getAnnouncements' });
  if (!res.ok) { el.innerHTML = `<div class="empty-state" style="color:#E05050">${res.error}</div>`; return; }
  const list = res.announcements || [];
  if (!list.length) { el.innerHTML = '<div class="empty-state">目前沒有公告</div>'; return; }
  el.innerHTML = list.map(a => `
    <div class="member-row" style="align-items:flex-start;gap:10px">
      <div style="flex:1">
        <div style="font-size:14px;color:#F0F0FF;line-height:1.6">${esc(a.text)}</div>
        <div style="font-size:11px;color:#3A5070;margin-top:4px">ID: ${esc(a.id)}</div>
      </div>
      <span style="font-size:11px;padding:2px 8px;border-radius:6px;background:rgba(0,201,177,.1);border:1px solid rgba(0,201,177,.3);color:#00C9B1;white-space:nowrap;flex-shrink:0">顯示中</span>
      <button class="btn btn-danger btn-sm" style="flex-shrink:0" onclick="deleteAnnouncementAction('${esc(a.id)}')">🗑 刪除</button>
    </div>`).join('');
}

async function createAnnouncementAction() {
  const text = document.getElementById('ann-text').value.trim();
  if (!text) { toast('請輸入公告內容', true); return; }
  const active = document.getElementById('ann-active').checked;
  const btn = document.getElementById('ann-create-btn');
  btn.disabled = true; btn.innerHTML = '<span class="loading-spinner"></span>建立中…';
  const res = await api({ action: 'createAnnouncement', password: pwd, text, active });
  btn.disabled = false; btn.textContent = '新增公告';
  if (res.ok) {
    toast(res.message || '公告已建立');
    document.getElementById('ann-text').value = '';
    document.getElementById('ann-active').checked = true;
    loadAnnouncements();
  } else toast(res.error || '建立失敗', true);
}

async function deleteAnnouncementAction(id) {
  if (!confirm('確認刪除此公告？')) return;
  const res = await api({ action: 'deleteAnnouncement', password: pwd, announcementId: id });
  if (res.ok) { toast('公告已刪除'); loadAnnouncements(); }
  else toast(res.error || '刪除失敗', true);
}

// ── 工具 ──────────────────────────────────────────
async function api(data) {
  try {
    const r = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(data) });
    return r.json();
  } catch(e) { return { ok: false, error: '網路錯誤' }; }
}
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function certName(c) { return {無證:'無 證',A1:'A1',A2pool:'A2 Pool',A2:'A2'}[c]||c; }
function fmtDT(val) {
  if (!val) return '—';
  const s = String(val);
  if (s.includes('1899')) return '—';
  return s.replace('T',' ').replace(/\.\d+Z?$/,'').slice(0,16);
}

let toastTimer;
function toast(msg, isError) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show'+(isError?' error':'');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.className = 'toast'+(isError?' error':''), 2800);
}
