<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>HertzQuest 忙聲聶莽路麓氓戮聦氓聫掳</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, 'Noto Sans TC', sans-serif; background: #0A1628; color: #F0F0FF; min-height: 100vh; }

#login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 32px 20px; }
.logo-area { text-align: center; margin-bottom: 36px; }
.logo-area h1 { font-size: 26px; font-weight: 900; color: #00C9B1; }
.logo-area p  { font-size: 14px; color: #7FBBCC; margin-top: 6px; }
.login-card { background: #0D2240; border: 1px solid #1E4060; border-radius: 20px; padding: 32px 24px; width: 100%; max-width: 380px; }
.login-card label { font-size: 13px; color: #7FBBCC; display: block; margin-bottom: 6px; }
.login-card input { width: 100%; background: #112840; border: 1px solid #1E4060; border-radius: 10px; padding: 14px 16px; font-size: 16px; color: #F0F0FF; outline: none; margin-bottom: 20px; }
.login-card input:focus { border-color: #00C9B1; }

#main-screen { display: none; }
.top-bar { background: #0D2240; border-bottom: 1px solid #1E4060; padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.top-bar h1 { font-size: 17px; font-weight: 700; color: #00C9B1; }
.logout-btn { background: none; border: 1px solid #1E4060; color: #7FBBCC; border-radius: 8px; padding: 6px 14px; font-size: 13px; cursor: pointer; }

.tab-bar { display: flex; background: #0D2240; border-bottom: 1px solid #1E4060; overflow-x: auto; scrollbar-width: none; }
.tab-bar::-webkit-scrollbar { display: none; }
.tab-btn { flex: 1; min-width: 72px; padding: 12px 6px; font-size: 12px; font-weight: 600; color: #7FBBCC; background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; white-space: nowrap; text-align: center; }
.tab-btn.active { color: #00C9B1; border-bottom-color: #00C9B1; }
.tab-content { display: none; padding: 20px; }
.tab-content.active { display: block; }

.card { background: #0D2240; border: 1px solid #1E4060; border-radius: 16px; padding: 20px; margin-bottom: 14px; }
.card-title { font-size: 14px; font-weight: 700; color: #00C9B1; margin-bottom: 16px; }

.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 12px; color: #7FBBCC; margin-bottom: 5px; }
.form-group input, .form-group textarea, .form-group select { width: 100%; background: #112840; border: 1px solid #1E4060; border-radius: 10px; padding: 12px 14px; font-size: 14px; color: #F0F0FF; outline: none; font-family: inherit; }
.form-group input:focus, .form-group textarea:focus { border-color: #00C9B1; }
.form-group textarea { resize: vertical; min-height: 80px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

.btn { display: inline-block; padding: 12px 20px; border-radius: 12px; font-size: 14px; font-weight: 700; cursor: pointer; border: none; text-align: center; }
.btn-primary { background: #00C9B1; color: #0A1628; width: 100%; padding: 16px; font-size: 16px; }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-danger  { background: rgba(224,80,80,0.15); border: 1px solid #E05050; color: #E05050; }
.btn-ghost   { background: rgba(0,201,177,0.1); border: 1px solid #00C9B1; color: #00C9B1; }
.btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 8px; }

.session-card { background: #112840; border: 1px solid #1E4060; border-radius: 14px; padding: 16px; margin-bottom: 12px; }
.session-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 10px; }
.session-title { font-size: 15px; font-weight: 700; }
.session-badge { font-size: 11px; padding: 3px 8px; border-radius: 6px; white-space: nowrap; flex-shrink: 0; }
.badge-open   { background: rgba(0,201,177,0.15); color: #00C9B1; border: 1px solid #00C9B1; }
.badge-closed { background: rgba(100,100,120,0.15); color: #7FBBCC; border: 1px solid #3A5070; }
.session-meta { font-size: 12px; color: #7FBBCC; line-height: 1.9; }
.session-meta span { display: block; }
.meet-point { color: #00C9B1; font-weight: 600; }
.session-stats { display: flex; gap: 12px; margin-top: 10px; padding-top: 10px; border-top: 1px solid #1E4060; }
.stat-box { flex: 1; text-align: center; }
.stat-box .num { font-size: 20px; font-weight: 900; color: #FFB030; }
.stat-box .lbl { font-size: 10px; color: #7FBBCC; margin-top: 2px; }
.session-actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }

/* cert summary bar */
.cert-bar { display: grid; grid-template-columns: repeat(4,1fr); gap: 6px; margin-top: 10px; padding: 10px; background: rgba(0,0,0,.2); border-radius: 10px; }
.cert-bar-item { text-align: center; }
.cert-bar-num { font-size: 15px; font-weight: 900; }
.cert-bar-lbl { font-size: 9px; color: #7FBBCC; margin-top: 1px; }
.uncert-warn { font-size: 11px; color: #E05050; text-align: center; margin-top: 6px; }

.trip-card { background: #112840; border: 1px solid #1E4060; border-radius: 14px; padding: 16px; margin-bottom: 12px; }
.trip-country-lbl { font-size: 11px; color: #7FBBCC; font-weight: 700; margin-bottom: 4px; }
.trip-title-h { font-size: 15px; font-weight: 700; }
.trip-info { font-size: 12px; color: #7FBBCC; margin-top: 4px; }
.price-tags { display: flex; gap: 8px; flex-wrap: wrap; margin: 8px 0; }
.price-tag { font-size: 11px; background: rgba(255,176,48,.1); border: 1px solid rgba(255,176,48,.3); color: #FFB030; border-radius: 8px; padding: 3px 10px; }

.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; align-items: flex-end; }
.modal-overlay.show { display: flex; }
.modal-sheet { background: #0D2240; border: 1px solid #1E4060; border-radius: 24px 24px 0 0; padding: 24px 20px; width: 100%; max-height: 80vh; overflow-y: auto; }
.modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.modal-header h3 { font-size: 16px; font-weight: 700; }
.modal-close { font-size: 22px; cursor: pointer; color: #7FBBCC; background: none; border: none; }
.member-row { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid #1E4060; gap: 12px; }
.member-row:last-child { border-bottom: none; }
.member-avatar { width: 40px; height: 40px; border-radius: 50%; background: #1E4060; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 700; color: #00C9B1; flex-shrink: 0; }
.member-info { flex: 1; }
.member-name { font-size: 14px; font-weight: 600; }
.member-phone { font-size: 12px; color: #7FBBCC; }
.member-date { font-size: 11px; color: #3A5070; margin-top: 2px; }
.cert-badge { font-size: 11px; padding: 2px 8px; border-radius: 6px; background: rgba(0,201,177,.1); border: 1px solid rgba(0,201,177,.3); color: #00C9B1; white-space: nowrap; flex-shrink: 0; }
.plan-badge { font-size: 11px; padding: 2px 8px; border-radius: 6px; background: rgba(255,176,48,.1); border: 1px solid rgba(255,176,48,.3); color: #FFB030; white-space: nowrap; flex-shrink: 0; }

.notify-area { margin-top: 16px; }
.notify-area textarea { width: 100%; background: #112840; border: 1px solid #1E4060; border-radius: 10px; padding: 12px; font-size: 14px; color: #F0F0FF; min-height: 100px; resize: vertical; font-family: inherit; outline: none; }
.notify-area textarea:focus { border-color: #00C9B1; }

.toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #1A3A5C; border: 1px solid #00C9B1; color: #00C9B1; padding: 12px 24px; border-radius: 40px; font-size: 14px; font-weight: 600; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; }
.toast.error { border-color: #E05050; color: #E05050; background: #1A1020; }
.toast.show { opacity: 1; }
.empty-state { text-align: center; padding: 48px 20px; color: #3A5070; font-size: 14px; }

.toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 4px 0; }
.toggle-row label { font-size: 13px; color: #7FBBCC; }
.toggle { position: relative; width: 46px; height: 26px; }
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle-slider { position: absolute; inset: 0; background: #1E4060; border-radius: 26px; cursor: pointer; transition: 0.2s; }
.toggle-slider:before { content: ''; position: absolute; height: 20px; width: 20px; left: 3px; top: 3px; background: #7FBBCC; border-radius: 50%; transition: 0.2s; }
.toggle input:checked + .toggle-slider { background: #00C9B1; }
.toggle input:checked + .toggle-slider:before { transform: translateX(20px); background: #0A1628; }

.loading-spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid #1E4060; border-top-color: #00C9B1; border-radius: 50%; animation: spin .6s linear infinite; margin-right: 8px; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>

  document.getElementById('modal-count').textContent = `氓聟卤 ${list.length} 盲陆聧氓颅赂氓聯隆氓聽卤氓聬聧`;

      <div style="text-align:center"><div style="font-size:18px;font-weight:900;color:#00C9B1">${counts.A1}</div><div style="font-size:10px;color:#7FBBCC">A1</div></div>
      <div style="text-align:center"><div style="font-size:18px;font-weight:900;color:#00C9B1">${counts.A2pool}</div><div style="font-size:10px;color:#7FBBCC">A2 Pool</div></div>
      <div style="text-align:center"><div style="font-size:18px;font-weight:900;color:#00C9B1">${counts.A2}</div><div style="font-size:10px;color:#7FBBCC">A2</div></div>
    </div>`;

  if (!list.length) { document.getElementById('modal-list').innerHTML = '<div class="empty-state">氓掳職莽聞隆氓颅赂氓聯隆氓聽卤氓聬聧</div>'; return; }

    const isPaid = m.paymentStatus === 'confirmed';
    const payHTML = isPaid
      ? `<span style="color:#00C9B1;font-size:12px;font-weight:700">芒聹聯 氓路虏忙聰露忙卢戮</span>`

         </label>`;
    return `
    <div class="member-row">
      <div class="member-avatar">${(m.name||'?').charAt(0)}</div>
      <div class="member-info">
        <div class="member-name">${esc(m.name)}</div>
        <div class="member-phone">${esc(m.phone||'')}</div>
        <div class="member-date">氓聽卤氓聬聧忙聳录 ${fmtDT(m.at)}</div>
        ${m.lineUid?`<div style="font-size:11px;color:#7FBBCC;cursor:pointer;margin-top:2px;user-select:all" onclick="copyUID('${esc(m.lineUid)}')">LINE: ${esc(m.lineUid)}</div>`:''}

        ${m.certLevel?`<span class="cert-badge">${certName(m.certLevel)}</span>`:''}
        <div id="pay-status-${eid}">${payHTML}</div>
        <span style="font-size:12px;color:#7FBBCC">#${i+1}</span>
      </div>
    </div>`;
  }).join('');

async function loadMembers() {
  const el = document.getElementById('members-list');
  el.innerHTML = '<div style="text-align:center;padding:20px;color:#7FBBCC"><span class="loading-spinner"></span>猫录聣氓聟楼盲赂颅芒聙娄</div>';
  const res = await api({ action: 'allSessions', password: pwd });
  if (!res.ok) { el.innerHTML = `<div style="color:#E05050">${res.error}</div>`; return; }
  const sessions = res.sessions.slice(0, 3);
  if (!sessions.length) { el.innerHTML = '<div class="empty-state">氓掳職莽聞隆忙麓禄氓聥聲</div>'; return; }
  let html = '';
  for (const s of sessions) {
    const lr = await api({ action: 'getEnrollList', password: pwd, sessionId: s.id });
    if (!lr.ok || !lr.list.length) continue;
    html += `<div style="font-size:13px;font-weight:700;color:#00C9B1;margin:16px 0 8px">${esc(s.title)} (${s.date})</div>`;
    html += lr.list.map(m => `
      <div class="member-row">
        <div class="member-avatar">${(m.name||'?').charAt(0)}</div>
        <div class="member-info"><div class="member-name">${esc(m.name)}</div><div class="member-phone">${esc(m.phone||'')}</div></div>
        ${m.certLevel?`<span class="cert-badge">${certName(m.certLevel)}</span>`:''}
      </div>`).join('');
  }
  el.innerHTML = html || '<div class="empty-state">猫驴聭忙聹聼忙麓禄氓聥聲莽聞隆氓聽卤氓聬聧氓颅赂氓聯隆</div>';
}

function copyUID(uid) {
  if (!uid) return;
  const fallback = () => {
    const ta = document.createElement('textarea');
    ta.value = uid; ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove();
    toast('LINE UID 氓路虏猫陇聡猫拢陆');
  };
  if (navigator.clipboard) {
    navigator.clipboard.writeText(uid).then(() => toast('LINE UID 氓路虏猫陇聡猫拢陆')).catch(fallback);
  } else { fallback(); }
}

async function confirmPaymentAction(enrollId, elemId, checkbox) {
  if (!enrollId) { toast('莽聞隆忙鲁聲氓聫聳氓戮聴氓聽卤氓聬聧ID', true); checkbox.checked = false; return; }
  checkbox.disabled = true;
  const res = await api({ action: 'confirmPayment', password: pwd, enrollId });
  if (res.ok) {
    toast('芒聹聟 氓路虏忙篓聶猫篓聵氓路虏忙聰露忙卢戮');
    const el = document.getElementById('pay-status-'+elemId);
    if (el) el.innerHTML = '<span style="color:#00C9B1;font-size:12px;font-weight:700">芒聹聯 氓路虏忙聰露忙卢戮</span>';
  } else {
    toast(res.error || '忙聸麓忙聳掳氓陇卤忙聲聴', true);
    checkbox.disabled = false;
    checkbox.checked = false;
  }
}

// 芒聰聙芒聰聙 氓路楼氓聟路 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
async function api(data) {
  try {
    const r = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(data) });
    return r.json();
  } catch(e) { return { ok: false, error: '莽露虏猫路炉茅聦炉猫陋陇' }; }
}
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function certName(c) { return {莽聞隆猫颅聣:'莽聞隆 猫颅聣',A1:'A1',A2pool:'A2 Pool',A2:'A2'}[c]||c; }
function fmtDT(val) {
  if (!val) return '芒聙聰';
  const s = String(val);
  if (s.includes('1899')) return '芒聙聰';
  return s.replace('T',' ').replace(/\.\d+Z?$/,'').slice(0,16);
}

let toastTimer;
function toast(msg, isError) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show'+(isError?' error':'');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.className = 'toast'+(isError?' error':''), 2800);
}
